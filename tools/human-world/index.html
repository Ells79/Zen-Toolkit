<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>这世界那么多人 | ells 的数字档案室</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --folder-base: #b18453; 
            --paper-light: #f7efdc;
            --ink: #1a1a1a;
            --stamp: #8b2d2d;

            /* 核心素材引用 - 使用 GitHub Raw 路径 */
            --texture: url('https://raw.githubusercontent.com/Ells79/Zen-Toolkit/main/tools/human-world/assets/npz100.png');
            --tape: url('https://raw.githubusercontent.com/Ells79/Zen-Toolkit/main/tools/human-world/assets/100x300.webp');
            --border: url('https://raw.githubusercontent.com/Ells79/Zen-Toolkit/main/tools/human-world/assets/120x150.png');
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            font-family: "STSong", "Songti SC", "SimSun", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .desk {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 20%, #2a2a2a 0%, #050505 100%);
            z-index: -1;
        }

        /* 模拟物理文件夹 */
        .folder {
            position: relative;
            width: 440px;
            height: 600px;
            background-color: var(--folder-base);
            background-image: var(--texture);
            background-repeat: repeat;
            border-radius: 6px 16px 16px 6px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            border-left: 20px solid rgba(0,0,0,0.2);
        }

        /* 右侧索引标签 */
        .folder::after {
            content: "1978 - 2008";
            position: absolute;
            right: -2px;
            top: 100px;
            width: 35px;
            height: 140px;
            background-color: var(--folder-base);
            background-image: var(--texture);
            border-radius: 0 8px 8px 0;
            writing-mode: vertical-rl;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: rgba(0,0,0,0.4);
            letter-spacing: 2px;
            box-shadow: 2px 5px 10px rgba(0,0,0,0.3);
        }

        .page-stack {
            position: relative;
            width: 380px;
            height: 540px;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--paper-light);
            background-image: var(--texture);
            background-repeat: repeat;
            padding: 45px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: all 0.8s cubic-bezier(0.25, 1, 0.3, 1);
            cursor: pointer;
            transform-origin: bottom left;
            opacity: 0;
            pointer-events: none;
        }

        .card.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 照片外框组件 */
        .photo-frame {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 120px;
            height: 150px;
            background-image: var(--border);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 5;
            transform: rotate(3deg);
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        /* 顶部封条贴纸 */
        .photo-frame::after {
            content: "";
            position: absolute;
            top: -20px;
            left: 10px;
            width: 100px;
            height: 40px;
            background-image: var(--tape);
            background-size: contain;
            background-repeat: no-repeat;
            transform: rotate(-8deg);
            z-index: 10;
            pointer-events: none;
        }

        .photo-frame .inner-img {
            width: 80%;
            height: 70%;
            background-size: cover;
            background-position: center;
            filter: grayscale(1) contrast(1.3) sepia(0.2);
            background-color: #ccc;
            margin-top: -10px;
        }

        .id-label {
            font-family: monospace;
            font-size: 11px;
            color: #888;
            border: 1px solid rgba(0,0,0,0.1);
            padding: 2px 8px;
            display: inline-block;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        h2 {
            margin: 0 0 25px 0;
            font-size: 26px;
            color: #000;
            font-weight: 500;
        }

        .story-content {
            font-size: 16.5px;
            line-height: 2;
            color: var(--ink);
            text-align: justify;
            opacity: 0;
            transform: translateY(15px);
            transition: all 1.5s ease 0.4s;
        }

        .card.active .story-content {
            opacity: 1;
            transform: translateY(0);
        }

        .red-stamp {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 75px;
            height: 75px;
            border: 2px dashed var(--stamp);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--stamp);
            font-weight: bold;
            font-size: 12px;
            transform: rotate(-15deg);
            opacity: 0.3;
            pointer-events: none;
        }

        .navigation-hint {
            position: absolute;
            bottom: -60px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #555;
            font-size: 13px;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

<div class="desk"></div>

<div class="folder">
    <div class="page-stack" id="stack">
        <!-- 动态注入卡片 -->
    </div>
    <div class="navigation-hint">点击卡片 · 开启下一个人生档案</div>
</div>

<script>
    const dataPool = [
        {
            id: "SH-1988-X",
            name: "老沈",
            object: "英雄钢笔",
            img: "https://images.unsplash.com/photo-1585336261022-680e295ce3fe?q=80&w=300&auto=format&fit=crop",
            text: "1988年的上海，他是弄堂里唯一的代笔人。在那张只有两平米的木桌上，他替远赴重洋的留学生写家信，也替下岗的工人写求职书。他总说，纸上的墨迹是有温度的，能传到几千公里外。"
        },
        {
            id: "SZ-1992-W",
            name: "小芳",
            object: "暂住证",
            img: "https://images.unsplash.com/photo-1544377193-33dcf4d68fb5?q=80&w=300&auto=format&fit=crop",
            text: "1992年春，她拎着红蓝编织袋走出车站，脚下是深圳火车站温热的柏油路。她是凯达厂第一批缝纫女工。那张泛黄的暂住证，记录了她从农田走向世界工厂的第一步。"
        },
        {
            id: "BJ-2001-Z",
            name: "张工",
            object: "3.5寸软盘",
            img: "https://images.unsplash.com/photo-1591405351990-4726e331f141?q=80&w=300&auto=format&fit=crop",
            text: "中关村的海龙大厦还没拆的时候，他在地下一层的柜台里组装电脑。那是拨号上网的最后一年。他每天把几兆的代码存进这张软盘，觉得自己正在亲手敲开数字时代的大门。"
        }
    ];

    let currentIndex = 0;
    const stack = document.getElementById('stack');

    function displayNext() {
        const item = dataPool[currentIndex];
        const card = document.createElement('div');
        card.className = 'card active';
        
        card.innerHTML = `
            <div class="photo-frame">
                <div class="inner-img" style="background-image: url('${item.img}')"></div>
            </div>
            <div class="id-label">ARCHIVE NO: ${item.id}</div>
            <h2>${item.name}</h2>
            <div class="story-content">${item.text}</div>
            <div class="red-stamp">已存档</div>
        `;

        card.onclick = () => {
            // 随机飞散效果
            const side = Math.random() > 0.5 ? 1 : -1;
            const rot = Math.random() * 40 - 20;
            card.style.transform = `translateX(${side * 180}%) rotate(${rot}deg)`;
            card.style.opacity = '0';
            
            setTimeout(() => {
                card.remove();
                currentIndex = (currentIndex + 1) % dataPool.length;
                displayNext();
            }, 800);
        };

        stack.prepend(card);
    }

    // 初始运行
    window.addEventListener('DOMContentLoaded', displayNext);
</script>

</body>
</html>
