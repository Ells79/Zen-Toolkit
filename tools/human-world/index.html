<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>这世界那么多人 | 档案室</title>
    <style>
        :root {
            --bg-dark: #050505;
            --folder-color: #9c7146; 
            --paper-aged: #f2efde; 
            --ink: #1a1a1a;
            --typewriter: 'Courier New', Courier, monospace;

            /* 纹理引用 - 仅用于文件夹外壳 */
            --texture: url('https://raw.githubusercontent.com/Ells79/Zen-Toolkit/main/tools/human-world/assets/npz100.png');
            
            /* 【ells 提示】核心照片 WebP 路径 */
            --default-polaroid: url('https://raw.githubusercontent.com/Ells79/Zen-Toolkit/main/tools/human-world/assets/oldpic.webp');
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .desk {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
            z-index: -1;
        }

        /* 文件夹一体化系统 */
        .folder-system {
            position: relative;
            filter: drop-shadow(0 40px 80px rgba(0,0,0,0.85));
            display: flex;
            align-items: flex-start;
        }

        .folder-main {
            position: relative;
            width: 580px;
            height: 760px;
            background-color: var(--folder-color);
            background-image: var(--texture);
            background-repeat: repeat;
            border-radius: 4px 0px 0px 4px; 
            display: flex;
            justify-content: center;
            align-items: center;
            border-left: 30px solid rgba(0,0,0,0.3);
            box-shadow: inset 0 0 60px rgba(0,0,0,0.2);
            z-index: 2;
        }

        .folder-tab {
            position: absolute;
            left: 100%;
            top: 120px;
            width: 45px;
            height: 180px;
            background-color: var(--folder-color);
            background-image: var(--texture);
            background-repeat: repeat;
            border-radius: 0 15px 15px 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            writing-mode: vertical-rl;
            font-size: 11px;
            font-weight: bold;
            color: rgba(0,0,0,0.35);
            letter-spacing: 8px;
            margin-left: -1px; 
            z-index: 1;
        }

        .folder-main::after, .folder-tab::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--texture);
            opacity: 0.3;
            mix-blend-mode: multiply;
            pointer-events: none;
        }

        .page-stack {
            position: relative;
            width: 460px;
            height: 640px;
        }

        .layer-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #ede9d3;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--paper-aged);
            background-image: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%);
            /* 修正对齐：考虑打孔位的非对称间距 (85px left vs 50px right) */
            padding: 20px 50px 50px 85px;
            box-sizing: border-box;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            transition: all 0.9s cubic-bezier(0.25, 1, 0.3, 1);
            cursor: pointer;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
        }

        .card.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 像素级打孔细节 */
        .punch-holes {
            position: absolute;
            left: 35px;
            top: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 120px 0;
            box-sizing: border-box;
            z-index: 15;
        }

        .hole {
            width: 18px;
            height: 18px;
            background-color: #1a1a1a; 
            border-radius: 50%;
            position: relative;
            box-shadow: 0px 1.5px 0px rgba(255,255,255,0.6), 
                        inset 2px 3px 5px rgba(0,0,0,1);
        }

        /* 挂靠容器：对齐修正与硬光投影 */
        .cliptop-photo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            /* 修正：向左偏移17.5px以抵消内边距差异，实现相对于纸张宽度的视觉居中 */
            transform: translateX(-17.5px);
            margin-top: -55px; 
            margin-bottom: 30px;
            position: relative;
            z-index: 20; 
        }

        .cliptop-photo {
            width: 200px;
            height: 250px;
            background-image: var(--default-polaroid);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center top;
            /* 强化硬光影子：向下位移，中度模糊，更高对比度 */
            filter: drop-shadow(0 12px 12px rgba(0,0,0,0.5));
            transform: rotate(-0.5deg);
        }

        .submission-details {
            font-family: var(--typewriter);
            font-size: 13px;
            color: var(--ink);
            line-height: 1.4;
            border-top: 1px solid rgba(0,0,0,0.06);
            padding-top: 35px;
            margin-top: 10px;
        }

        .detail-item {
            display: flex;
            margin-bottom: 8px;
        }

        .detail-label {
            width: 160px;
            color: #777;
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-weight: 600;
        }

        .story-section {
            margin-top: 25px;
            text-align: justify;
            line-height: 2;
            font-family: "STSong", "Songti SC", serif;
            font-size: 16px;
            color: #2c2c2c;
            border-top: 1px dashed rgba(0,0,0,0.1);
            padding-top: 20px;
        }

        .hint {
            position: absolute;
            bottom: -80px;
            width: 100%;
            text-align: center;
            color: #555;
            font-size: 12px;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

<div class="desk"></div>

<div class="folder-system">
    <div class="folder-main">
        <div class="page-stack" id="stack">
            <div class="layer-bg" style="transform: rotate(-1.5deg) translate(-5px, 2px);"></div>
            <div class="layer-bg" style="transform: rotate(1deg) translate(4px, 5px);"></div>
            <div class="layer-bg" style="transform: rotate(-0.5deg) translate(1px, -3px);"></div>
        </div>
    </div>
    <div class="folder-tab">ARCHIVE</div>
</div>

<div class="hint">NEXT SUBMISSION →</div>

<script>
    const archiveData = [
        {
            id: "CASE-SH-88",
            name: "Lao Shen / 老沈",
            item: "HERO-PEN / 钢笔",
            status: "Verified",
            img: "https://raw.githubusercontent.com/Ells79/Zen-Toolkit/main/tools/human-world/assets/oldpic.webp", 
            story: "1988年的上海，他是弄堂里唯一的代笔人。在那张只有两平米的木桌上，他替远赴重洋的留学生写家信，也替下岗的工人写求职书。他总说，纸上的墨迹是有温度的。这世界那么多人，他曾在字里行间，缝补过成千上万个破碎的思念。",
            ref: "SUBMISSION NO: E21"
        },
        {
            id: "CASE-SZ-92",
            name: "Xiao Fang / 小芳",
            item: "ID-CARD / 暂住证",
            status: "Closed",
            img: "https://raw.githubusercontent.com/Ells79/Zen-Toolkit/main/tools/human-world/assets/oldpic.webp", 
            story: "1992年春，她拎着红蓝编织袋走出车站，脚下是深圳火车站温热的柏油路。她是凯达厂第一批缝纫女工。那张泛黄的暂住证，记录了她从农田走向世界工厂的第一步。这世界那么多人，她曾是那座城市最忙碌的背影之一。",
            ref: "SUBMISSION NO: SZ-04"
        }
    ];

    let currentIdx = 0;
    const stack = document.getElementById('stack');

    function renderNext() {
        const item = archiveData[currentIdx];
        const card = document.createElement('div');
        card.className = 'card active';
        
        card.innerHTML = `
            <div class="punch-holes">
                <div class="hole"></div>
                <div class="hole"></div>
                <div class="hole"></div>
            </div>
            
            <div class="cliptop-photo-container">
                <div class="cliptop-photo" style="background-image: url('${item.img}')"></div>
            </div>

            <div class="submission-details">
                <div class="detail-item"><span class="detail-label">Archive Number:</span> <span class="detail-value">${item.id}</span></div>
                <div class="detail-item"><span class="detail-label">Approval Status:</span> <span class="detail-value">${item.status}</span></div>
                <div class="detail-item"><span class="detail-label">Evidence Item:</span> <span class="detail-value">${item.item}</span></div>
                
                <div class="story-section">
                    ${item.story}
                </div>
            </div>
        `;

        card.onclick = () => {
            card.style.transform = `translate(160%, -120%) rotate(50deg)`;
            card.style.opacity = '0';
            
            setTimeout(() => {
                card.remove();
                currentIdx = (currentIdx + 1) % archiveData.length;
                renderNext();
            }, 850);
        };

        stack.prepend(card);
    }

    window.onload = renderNext;
</script>

</body>
</html>
