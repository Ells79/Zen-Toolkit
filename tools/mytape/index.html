    <style>
        :root {
            --bg-color: #dcdcdf;
            --apple-text: #1d1d1f;
            --accent-orange: #e97850; 
            --color-human: #e2e2e5;    
            --color-ai: #e97850;       
            --slider-progress: 0%;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: linear-gradient(180deg, #f7f7f9 0%, var(--bg-color) 100%);
            color: var(--apple-text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            user-select: none;
            touch-action: none;
        }

        /* 加载遮罩 */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f7f7f9; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 999;
            transition: opacity 0.4s ease;
        }
        .loader-bar { width: 40px; height: 1px; background: rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .loader-progress { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--accent-orange); transition: width 0.1s; }

        .noise-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03; pointer-events: none; z-index: 1;
        }

        #app {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: flex-start; align-items: center;
            z-index: 2; perspective: 2500px;
            padding: 10vh 0 4vh 0;
            opacity: 0; transition: opacity 0.6s ease;
        }

        /* 3D 穿梭歌词容器 */
        #lyrics-container {
            position: relative; width: 100%; height: 8vh;
            display: flex; justify-content: center; align-items: center;
            transform-style: preserve-3d; margin-bottom: 2vh;
        }

        .lyric-line {
            position: absolute; text-align: center; width: 85%;
            font-size: clamp(0.85rem, 3vw, 1rem); font-weight: 300;
            letter-spacing: 0.25em; transition: all 1.8s cubic-bezier(0.1, 0.4, 0.2, 1);
            opacity: 0; filter: blur(10px);
        }

        /* 曲名特有样式 */
        .lyric-line.is-title { font-weight: 600; letter-spacing: 0.6em; text-transform: uppercase; font-size: 1.1rem; }

        .lyric-line.active { opacity: 0.95; transform: translateZ(180px); filter: blur(0px); color: #000; font-weight: 400; }
        .lyric-line.past { opacity: 0; transform: translateZ(500px) translateY(-50px); }
        .lyric-line.future { opacity: 0; transform: translateZ(-400px) translateY(50px); }

        /* 磁带视觉：深度阴影 */
        .specimen-case {
            position: relative; z-index: 10;
            transform: rotateX(8deg) translateZ(0);
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            filter: 
                drop-shadow(20px 40px 25px rgba(0,0,0,0.35))
                drop-shadow(35px 70px 60px rgba(0,0,0,0.2));
            margin-bottom: 4vh; 
            animation: case-breath 18s ease-in-out infinite;
        }

        @keyframes case-breath { 
            0%, 100% { transform: rotateX(8deg) translateY(0) translateZ(0); } 
            50% { transform: rotateX(8.8deg) translateY(-8px) translateZ(0); } 
        }

        canvas {
            max-width: 80vw; max-height: 38vh;
            display: block; border-radius: 40px;
            image-rendering: -webkit-optimize-contrast;
        }

        #diag-toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
            border-radius: 20px; font-size: 11px; letter-spacing: 0.1em;
            opacity: 0; transition: 0.4s; z-index: 1000; pointer-events: none;
        }

        .interaction-area {
            display: flex; flex-direction: column; align-items: center; 
            width: 100%; gap: 2.5vh; padding-bottom: 2vh;
        }

        .mode-toggle-container { display: flex; align-items: center; gap: 12px; }
        .toggle-well {
            padding: 2.5px; background: rgba(0,0,0,0.02); border-radius: 18px;
            box-shadow: inset 1px 2px 4px rgba(0,0,0,0.08); display: flex; align-items: center;
        }
        .toggle-plate { width: 50px; height: 20px; background: rgba(0,0,0,0.04); border-radius: 10px; position: relative; cursor: pointer; overflow: hidden; }
        .toggle-bg-color { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); opacity: 0.85; }
        .mode-toggle-group.human .toggle-bg-color { background: var(--color-human); }
        .mode-toggle-group.ai .toggle-bg-color { background: var(--color-ai); }
        .toggle-lever { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: linear-gradient(145deg, #f0f0f3, #dcdce0); border-radius: 50%; box-shadow: 0 1px 4px rgba(0,0,0,0.1); transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
        .mode-toggle-group.ai .toggle-lever { transform: translateX(30px); }
        .mode-label { font-size: 8px; font-weight: 800; letter-spacing: 0.22em; opacity: 0.2; transition: 0.4s; min-width: 45px; text-align: center; }
        .mode-label.active { opacity: 0.65; color: #000; }

        .selector-box { position: relative; width: 100%; height: 50px; overflow: visible; mask-image: linear-gradient(to right, transparent, black 35%, black 65%, transparent); }
        #track-dial { position: absolute; top: 10px; left: 50%; margin-left: -250px; width: 500px; height: 500px; border-radius: 50%; transition: transform 0.85s cubic-bezier(0.15, 1, 0.3, 1); cursor: grab; z-index: 5; }
        .track-num { position: absolute; top: 12px; left: 50%; width: 60px; margin-left: -30px; text-align: center; transform-origin: center 238px; font-weight: 900; font-size: 14px; color: rgba(0,0,0,0.25); transition: all 0.4s; }
        .track-tick { position: absolute; top: 8px; left: 50%; width: 1px; height: 3px; background: rgba(0,0,0,0.15); transform-origin: center 242px; }
        .track-num.active { color: var(--apple-text); transform: scale(1.35); }

        .progress-bar-wrapper { width: 200px; margin-bottom: 1vh; position: relative; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { height: 4px; border-radius: 2px; background: linear-gradient(to right, var(--accent-orange) 0%, var(--accent-orange) var(--slider-progress), rgba(0,0,0,0.05) var(--slider-progress), rgba(0,0,0,0.05) 100%); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 10px; width: 18px; border-radius: 5px; background: #fbfbfb; box-shadow: 0 2px 5px rgba(0,0,0,0.08); margin-top: -3px; }

        .button-group { display: flex; align-items: center; justify-content: center; gap: 28px; }
        .button-well { width: 50px; height: 50px; background: rgba(0,0,0,0.03); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: inset 2.5px 3.5px 7px rgba(0,0,0,0.18), inset -1.5px -2px 4px rgba(255,255,255,0.75); }
        .button-well.large { width: 72px; height: 72px; }
        .control-btn { width: 42px; height: 42px; border-radius: 50%; background: rgba(255, 255, 255, 0.22); backdrop-filter: blur(20px); border: 0.5px solid rgba(255, 255, 255, 0.4); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.4s; color: rgba(0,0,0,0.18); }
        .control-btn:hover { background: rgba(255, 255, 255, 0.35); color: #000; }
        .control-btn.main { width: 62px; height: 62px; color: var(--accent-orange); background: rgba(255, 255, 255, 0.35); }

        .status-footer { font-size: 7px; letter-spacing: 0.25em; color: #808080; text-transform: uppercase; font-weight: 400; margin-top: 3vh; }

        @media (min-width: 1024px) {
            #app { padding: 12vh 0 6vh 0; }
            canvas { max-width: 65vw; }
        }
    </style>
</head>

        let currentTrackIndex = 0, isPlaying = false, rotation = 0, currentMode = 'human';

        const diagToast = document.getElementById('diag-toast');

        const showDiag = (msg) => { diagToast.innerText = msg; diagToast.style.opacity = '1'; setTimeout(() => diagToast.style.opacity = '0', 3000); };

        const safePlay = async () => { 
            try { 
                await audio.play(); isPlaying = true; 
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; 
            } catch (e) { showDiag("点击播放按钮启动音频"); } 
        };

        audio.onerror = () => showDiag("音频加载失败，请检查 OSS 权限或余额");
        
        function toggleMode() {
            const wrapper = document.getElementById('modeWrapper'), labels = document.querySelectorAll('.mode-label');
            let percent = audio.duration ? audio.currentTime / audio.duration : 0;
            currentMode = currentMode === 'human' ? 'ai' : 'human';
            wrapper.className = `mode-toggle-group ${currentMode}`;
            labels[0].classList.toggle('active', currentMode === 'human'); labels[1].classList.toggle('active', currentMode === 'ai');
            const song = playlist[currentTrackIndex];
            if (song) { 
                audio.pause(); 
                audio.src = currentMode === 'human' ? song.humanSrc : song.aiSrc; 
                initLyrics(currentMode === 'human' ? song.humanLyrics : song.aiLyrics); 
                audio.load(); 
                audio.onloadedmetadata = () => { 
                    audio.currentTime = audio.duration * percent; 
                    if (isPlaying) safePlay(); 
                }; 
            }
        }

        function draw() {
            const lw = 1200, lh = 953;
            if (canvas.width !== lw * dpr) { canvas.width = lw * dpr; canvas.height = lh * dpr; ctx.scale(dpr, dpr); }
            ctx.clearRect(0, 0, lw, lh);
            if (shellReady) {
                ctx.drawImage(assets.shell, 0, 0, lw, lh);
                drawReel(config.leftReel.x, config.leftReel.y, rotation);
                drawReel(config.rightReel.x, config.rightReel.y, rotation);
            }
            if (isPlaying) rotation += 0.045;
            requestAnimationFrame(draw);
        }
        function drawReel(x, y, angle) { ctx.save(); ctx.translate(x, y); ctx.rotate(angle); if(assets.reel.complete) ctx.drawImage(assets.reel, -config.reelSize/2, -config.reelSize/2, config.reelSize, config.reelSize); ctx.restore(); }

        function initDial() {
            trackDial.innerHTML = '';

                const angle = i * config.rotationStep, div = document.createElement('div');
                div.className = `track-num ${i === 0 ? 'active' : ''}`; div.innerText = (i + 1).toString().padStart(2, '0'); div.style.transform = `rotate(${angle}deg)`; trackDial.appendChild(div);
                for(let j=1; j<=4; j++) { const tick = document.createElement('div'); tick.className = 'track-tick'; tick.style.transform = `rotate(${angle + (j * (config.rotationStep / 5))}deg)`; trackDial.appendChild(tick); }
            });
        }

        function selectTrack(index) {
            currentTrackIndex = index; trackDial.style.transform = `rotate(${-index * config.rotationStep}deg)`;
            document.querySelectorAll('.track-num').forEach((el, i) => el.classList.toggle('active', i === index));
            const song = playlist[index];
            if (song) { 
                const wasPlaying = isPlaying; audio.pause(); 
                audio.src = currentMode === 'human' ? song.humanSrc : song.aiSrc; 
                initLyrics(currentMode === 'human' ? song.humanLyrics : song.aiLyrics); 
                if (wasPlaying) safePlay(); else audio.load(); 
            }
        }

        document.getElementById('rewindBtn').onclick = () => selectTrack((currentTrackIndex - 1 + playlist.length) % playlist.length);
        document.getElementById('forwardBtn').onclick = () => selectTrack((currentTrackIndex + 1) % playlist.length);

        playBtn.onclick = () => { if (audio.paused) safePlay(); else { audio.pause(); isPlaying = false; playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>'; } };
        audio.ontimeupdate = () => { if (isFinite(audio.duration)) { seekSlider.value = (audio.currentTime / audio.duration) * 100; document.documentElement.style.setProperty('--slider-progress', `${seekSlider.value}%`); updateLyrics(audio.currentTime); } };
        seekSlider.oninput = () => { if (audio.duration) audio.currentTime = (seekSlider.value / 100) * audio.duration; };

        function updateLyrics(time) {
            const song = playlist[currentTrackIndex], lyrics = currentMode === 'human' ? song.humanLyrics : song.aiLyrics;
            if(!lyrics) return;
            const lastLineDuration = 5; 
            lyrics.forEach((l, i) => {
                const el = document.getElementById(`lyric-${i}`); 
                if (el) {
                    if (l.text.toLowerCase() === 'stop') {
                        if (time >= l.time) el.className = 'lyric-line past';
                        else el.className = 'lyric-line future';
                        return;
                    }
                    const nextTime = lyrics[i+1] ? lyrics[i+1].time : l.time + lastLineDuration;
                    if (time >= l.time && time < nextTime) {
                        el.className = 'lyric-line active' + (l.isTitle ? ' is-title' : '');
                    } else if (time >= nextTime) {
                        el.className = 'lyric-line past' + (l.isTitle ? ' is-title' : '');
                    } else {
                        el.className = 'lyric-line future' + (l.isTitle ? ' is-title' : '');
                    }
                }
            });
        }
        function initLyrics(data) { lyricsContainer.innerHTML = ''; if(!data) return; data.forEach((l, i) => { const div = document.createElement('div'); div.className = 'lyric-line future' + (l.isTitle ? ' is-title' : ''); div.id = `lyric-${i}`; div.innerText = l.text; lyricsContainer.appendChild(div); }); }

        let isDragging = false, startX, currentRotation = 0;
        const startInt = (x) => { isDragging = true; startX = x; trackDial.style.transition = 'none'; };
        const moveInt = (x) => { if (!isDragging) return; const diff = (x - startX) * 0.12; trackDial.style.transform = `rotate(${currentRotation + diff}deg)`; };
        const endInt = (x) => { 
            if (!isDragging) return; 
            const diff = (x - startX) * 0.12; currentRotation += diff;

        };
