<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Story Lab v1.0</title>

<style>
body{
    background:#0a0a0a;
    color:#e8e8e8;
    font-family:system-ui;
    padding:40px;
}

h2{margin-bottom:5px;}
.desc{color:#888;margin-bottom:20px;}

textarea{
    width:100%;
    height:80px;
    background:#111;
    color:#fff;
    border:1px solid #333;
    padding:10px;
}

/* 历史 */
.history{
    margin-bottom:20px;
}

.history span{
    display:inline-block;
    padding:6px 12px;
    border:1px solid #333;
    margin-right:8px;
    cursor:pointer;
    font-size:12px;
    color:#aaa;
}

.history span:hover{
    border-color:#00ffff;
    color:#fff;
}

.tag{
    display:inline-block;
    padding:8px 14px;
    border:1px solid #333;
    margin:5px;
    cursor:pointer;
}

.tag small{
    display:block;
    font-size:11px;
    color:#666;
}

.tag.active{border-color:#00ffff;}

button{
    margin-top:15px;
    padding:8px 18px;
    background:#222;
    color:#fff;
    border:1px solid #444;
    cursor:pointer;
}

.results{
    margin-top:30px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
}

.card{
    background:#111;
    border:1px solid #222;
    padding:15px;
}

.line{margin-bottom:8px;}

.recommend{color:#00ffff;margin-top:10px;}

.comment{
    color:#aaa;
    margin-top:10px;
    font-size:13px;
}

.output{
    margin-top:30px;
    background:#111;
    padding:20px;
    border:1px solid #222;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<h2>Story Lab v1.0</h2>

<div class="desc">
想法 → 故事 → 选择 → 分镜 → 积累
</div>

<!-- 历史 -->
<div id="history" class="history"></div>

<textarea id="seed" placeholder="例如：我在电梯里看到未来的自己"></textarea>

<div id="styles"></div>

<button onclick="generate()">Generate</button>

<div id="results" class="results"></div>

<div id="shots" class="output"></div>

<script>

const API_KEY = "sk-fedd40541f68477f83cb3827ceec4abd";

// ===== 风格 =====
const templates = {
    "观察": {desc:"压抑日常",prompt:`细节多，情绪不说`},
    "日常": {desc:"轻微偏移",prompt:`从日常开始，异常很小`},
    "冷静": {desc:"像记录",prompt:`像记录，不解释`}
};

let selected = ["观察"];
let currentStory = null;

// ===== UI =====
const container = document.getElementById("styles");

Object.keys(templates).forEach(name=>{
    const t = templates[name];
    const el=document.createElement("div");
    el.className="tag";
    el.innerHTML = `${name}<small>${t.desc}</small>`;
    if(name==="观察") el.classList.add("active");

    el.onclick=()=>{
        if(selected.includes(name)){
            selected = selected.filter(i=>i!==name);
            el.classList.remove("active");
        }else{
            if(selected.length>=2){alert("最多选2个");return;}
            selected.push(name);
            el.classList.add("active");
        }
    };
    container.appendChild(el);
});

// ===== Prompt =====
function buildPrompt(seed,style){
return `
写短故事

主题：${seed}

规则：
${style}

结构：
日常 → 异常 → 放大 → 观察 → 收尾

要求：
- 6~12句
- 每句像镜头
- 不解释
`;
}

// ===== 导演分镜 =====
function buildShotPrompt(story){
return `
你是导演。

不要复述文本，而是重构画面。

每个镜头必须增加信息。

输出JSON：
{
shot,
intent,
type,
camera,
visual,
sound
}

故事：
${story}
`;
}

// ===== 孔老六 =====
function buildJudge(A,B,C){
return `
选最自然的一个

输出两行：
A/B/C
一句短评

A:${A}
B:${B}
C:${C}
`;
}

// ===== API =====
async function callAI(prompt){
    const res = await fetch("https://api.deepseek.com/v1/chat/completions",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+API_KEY
        },
        body:JSON.stringify({
            model:"deepseek-chat",
            messages:[{role:"user",content:prompt}],
            temperature:0.85
        })
    });

    const data = await res.json();
    return data.choices[0].message.content;
}

// ===== 生成 =====
async function generate(){

    const seed=document.getElementById("seed").value;

    const s1 = templates[selected[0]].prompt;
    const s2 = templates[selected[1]]?.prompt;
    const mix = s2 ? s1+"\n"+s2 : s1;

    const [A,B,C] = await Promise.all([
        callAI(buildPrompt(seed,s1)),
        callAI(buildPrompt(seed,s2||s1)),
        callAI(buildPrompt(seed,mix))
    ]);

    const judge = await callAI(buildJudge(A,B,C));
    const lines = judge.split("\n");

    const pick = lines[0].trim();
    const comment = lines[1] || "";

    currentStory = {
        id: Date.now(),
        seed,A,B,C,pick,comment,shots:""
    };

    saveStory(currentStory);
    renderStories(currentStory);
    renderHistory();
}

// ===== 渲染故事 =====
function renderStories(data){

    const map = {A:data.A,B:data.B,C:data.C};

    document.getElementById("results").innerHTML =
        ["A","B","C"].map(k=>`
        <div class="card">
            ${map[k].split("\n").map(l=>`<div class="line">${l}</div>`).join("")}
            ${data.pick===k?`<div class="recommend">⭐ 孔老六选</div>`:""}
            <button onclick="makeShots('${k}')">分镜</button>
        </div>
    `).join("") + `<div class="comment">孔老六：${data.comment}</div>`;
}

// ===== 分镜 =====
async function makeShots(key){

    const story = currentStory[key];

    const json = await callAI(buildShotPrompt(story));

    document.getElementById("shots").innerText = json;

    currentStory.shots = json;
    updateCurrent();
}

// ===== 存储 =====
function saveStory(story){

    let arr = JSON.parse(localStorage.getItem("stories")||"[]");

    arr.push(story);
    arr = arr.slice(-3);

    localStorage.setItem("stories", JSON.stringify(arr));
}

function updateCurrent(){

    let arr = JSON.parse(localStorage.getItem("stories")||"[]");

    arr = arr.map(s=>s.id===currentStory.id?currentStory:s);

    localStorage.setItem("stories", JSON.stringify(arr));
}

// ===== 历史 =====
function renderHistory(){

    const arr = JSON.parse(localStorage.getItem("stories")||"[]");

    document.getElementById("history").innerHTML =
        arr.map((s,i)=>`
            <span onclick="loadStory(${i})">
            ${s.seed.slice(0,10)}
            </span>
        `).join("");
}

function loadStory(index){

    const arr = JSON.parse(localStorage.getItem("stories")||"[]");
    const s = arr[index];

    currentStory = s;

    document.getElementById("seed").value = s.seed;

    renderStories(s);

    document.getElementById("shots").innerText = s.shots || "";
}

// ===== 初始化 =====
window.onload = function(){
    renderHistory();
};

</script>

</body>
</html>
