<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Story Lab v1.0 Stable</title>

<style>
body{
    background:#0a0a0a;
    color:#e8e8e8;
    font-family:system-ui;
    padding:40px;
}

h2{margin-bottom:5px;}

.desc{color:#888;margin-bottom:10px;}
.flow{color:#555;margin-bottom:20px;font-size:13px;}

textarea{
    width:100%;
    height:80px;
    background:#111;
    color:#fff;
    border:1px solid #333;
    padding:10px;
}

.tag{
    display:inline-block;
    padding:8px 14px;
    border:1px solid #333;
    margin:5px;
    cursor:pointer;
}

.tag small{
    display:block;
    font-size:11px;
    color:#666;
}

.tag.active{border-color:#00ffff;}

button{
    margin-top:10px;
    padding:8px 16px;
    background:#222;
    color:#fff;
    border:1px solid #444;
    cursor:pointer;
}

.results{
    margin-top:30px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
}

.card{
    background:#111;
    border:1px solid #222;
    padding:15px;
}

.recommend{color:#00ffff;margin-top:10px;}

.output{
    margin-top:30px;
    background:#111;
    padding:20px;
    border:1px solid #222;
    white-space:pre-wrap;
}

.copy-btn{
    margin-top:10px;
    color:#00ffff;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>Story Lab v1.0 Stable</h2>

<div class="desc">
想法 → 故事 → 选择 → 分镜 → 视频
</div>

<div class="flow">
日常 → 偏差 → 放大 → 观察 → 收尾
</div>

<textarea id="seed" placeholder="例如：我在电梯里看到未来的自己"></textarea>

<div id="styles"></div>

<button onclick="generate()">Generate</button>

<div id="results" class="results"></div>

<div id="shots" class="output"></div>
<div class="copy-btn" onclick="copyShots()">复制 JSON</div>

<script>

const API_KEY = "sk-fedd40541f68477f83cb3827ceec4abd";

const templates = {
    "观察": {desc:"压抑日常",prompt:`细节多，情绪不说`},
    "日常": {desc:"轻微偏移",prompt:`从日常开始，异常很小`},
    "冷静": {desc:"像记录",prompt:`像记录，不解释`}
};

let selected = ["观察"];
let currentStory = null;

// UI
const container = document.getElementById("styles");

Object.keys(templates).forEach(name=>{
    const t = templates[name];
    const el=document.createElement("div");
    el.className="tag active";
    el.innerHTML = `${name}<small>${t.desc}</small>`;

    el.onclick=()=>{
        if(selected.includes(name)){
            selected = selected.filter(i=>i!==name);
            el.classList.remove("active");
        }else{
            if(selected.length>=2)return;
            selected.push(name);
            el.classList.add("active");
        }
    };
    container.appendChild(el);
});

// ===== Prompt =====
function buildPrompt(seed,style){
return `
写短故事

主题：${seed}

风格：
${style}

结构：
日常 → 异常 → 放大 → 观察 → 收尾

要求：
6~10句，每句像镜头，不解释
`;
}

function buildShotPrompt(story){
return `
你是导演。

输出 JSON 数组：

[
 { "shot":1,"intent":"","type":"","camera":"","visual":"","sound":"" }
]

每个镜头必须增加信息，不复述原文。

故事：
${story}
`;
}

function buildJudge(A,B,C){
return `
选最自然的一个

输出：
A/B/C
一句短评

A:${A}
B:${B}
C:${C}
`;
}

// ===== API =====
async function callAI(prompt){
    const res = await fetch("https://api.deepseek.com/v1/chat/completions",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+API_KEY
        },
        body:JSON.stringify({
            model:"deepseek-chat",
            messages:[{role:"user",content:prompt}],
            temperature:0.85
        })
    });

    const data = await res.json();
    return data.choices[0].message.content;
}

// ===== Generate =====
async function generate(){

    const seed=document.getElementById("seed").value;

    const s1 = templates[selected[0]].prompt;
    const s2 = templates[selected[1]]?.prompt;
    const mix = s2 ? s1+"\n"+s2 : s1;

    const [A,B,C] = await Promise.all([
        callAI(buildPrompt(seed,s1)),
        callAI(buildPrompt(seed,s2||s1)),
        callAI(buildPrompt(seed,mix))
    ]);

    const judge = await callAI(buildJudge(A,B,C));
    const pick = judge.split("\n")[0].trim();

    currentStory = {A,B,C,pick};

    renderStories();
}

function renderStories(){

    const map = currentStory;

    document.getElementById("results").innerHTML =
    ["A","B","C"].map(k=>`
    <div class="card">
        ${map[k].replace(/\n/g,"<br>")}
        ${map.pick===k?`<div class="recommend">⭐ 孔老六选</div>`:""}
        <button onclick="makeShots('${k}')">分镜</button>
    </div>`).join("");
}

// ===== 分镜 =====
async function makeShots(key){

    const raw = await callAI(buildShotPrompt(currentStory[key]));

    let shots;

    try{
        shots = JSON.parse(raw);
    }catch{
        alert("JSON失败");
        return;
    }

    const videoScript = shots.map(s=>({
        shot:s.shot,
        prompt: s.visual,
        duration:2
    }));

    document.getElementById("shots").innerText =
        JSON.stringify(videoScript,null,2);
}

// ===== 复制 =====
function copyShots(){
    navigator.clipboard.writeText(
        document.getElementById("shots").innerText
    );
    alert("已复制");
}

</script>

</body>
</html>
