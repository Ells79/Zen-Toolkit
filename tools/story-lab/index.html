<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Story Lab v0.5</title>

<style>
body{background:#0a0a0a;color:#e8e8e8;font-family:system-ui;padding:40px;}
textarea{width:100%;height:100px;background:#111;color:#fff;border:1px solid #333;padding:10px;}
.tag{display:inline-block;padding:6px 12px;border:1px solid #333;margin:5px;cursor:pointer;}
.tag.active{border-color:#00ffff;}
button{margin-top:20px;padding:10px 20px;background:#222;color:#fff;border:1px solid #444;}
.results{margin-top:30px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;}
.card{background:#111;border:1px solid #222;padding:15px;}
.line{margin-bottom:8px;line-height:1.5;}
</style>
</head>

<body>

<h2>Story Lab v0.5</h2>

<textarea id="seed" placeholder="输入一个想法..."></textarea>

<div id="styles"></div>

<button onclick="generate()">Generate</button>

<div id="results" class="results"></div>

<script>

// ===== 你的API KEY =====
const API_KEY = "sk-fedd40541f68477f83cb3827ceec4abd";

// ===== 风格 =====
const styles = [
    {id:"孤独"},
    {id:"温柔"},
    {id:"荒诞"},
    {id:"反转"},
    {id:"对话"},
    {id:"极简"}
];

let selected = [];

const container = document.getElementById("styles");

styles.forEach(s=>{
    const el=document.createElement("div");
    el.className="tag";
    el.innerText=s.id;

    el.onclick=()=>{
        if(selected.includes(s.id)){
            selected=selected.filter(i=>i!==s.id);
            el.classList.remove("active");
        }else{
            if(selected.length>=2){alert("最多2个");return;}
            selected.push(s.id);
            el.classList.add("active");
        }
    };

    container.appendChild(el);
});

// ===== 核心：调用API =====
async function callAI(prompt){

    const res = await fetch("https://api.deepseek.com/v1/chat/completions",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+API_KEY
        },
        body:JSON.stringify({
            model:"deepseek-chat",
            messages:[
                {role:"system",content:"你是一个擅长写极短漫画故事的作家，语言自然，有画面感"},
                {role:"user",content:prompt}
            ],
            temperature:0.9
        })
    });

    const data = await res.json();
    return data.choices[0].message.content;
}

// ===== 构建prompt（最关键）=====
function buildPrompt(seed,style){

    return `
写一个短故事。

主题：${seed}
风格：${style}

要求：
- 5到15句
- 每句像一个镜头
- 结构必须：
日常 → 异常 → 放大 → 观察 → 收尾

- 不要解释
- 不要总结
- 要有画面细节
- 语言自然

直接输出，每行一句。
`;
}

// ===== 生成 =====
async function generate(){

    const seed=document.getElementById("seed").value;

    if(selected.length===0){
        alert("选风格");
        return;
    }

    document.getElementById("results").innerHTML="Generating...";

    let outputs=[];

    if(selected.length===1){

        for(let i=0;i<3;i++){
            const text = await callAI(buildPrompt(seed,selected[0]));
            outputs.push({title:"A"+i,content:text});
        }
    }

    if(selected.length===2){

        const A = await callAI(buildPrompt(seed,selected[0]));
        const B = await callAI(buildPrompt(seed,selected[1]));
        const MIX = await callAI(buildPrompt(seed,selected.join("+")));

        outputs=[
            {title:"A",content:A},
            {title:"B",content:B},
            {title:"Mix",content:MIX}
        ];
    }

    document.getElementById("results").innerHTML = outputs.map(o=>`
        <div class="card">
            <div>${o.title}</div>
            ${o.content.split("\n").map(l=>`<div class="line">${l}</div>`).join("")}
        </div>
    `).join("");
}

</script>

</body>
</html>
