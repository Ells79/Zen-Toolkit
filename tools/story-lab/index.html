<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Story Lab</title>

<style>
body{
    background:#0a0a0a;
    color:#e8e8e8;
    font-family:system-ui;
    padding:40px;
}

textarea{
    width:100%;
    height:100px;
    background:#111;
    color:#fff;
    border:1px solid #333;
    padding:10px;
}

.tag{
    display:inline-block;
    padding:8px 14px;
    border:1px solid #333;
    margin:5px;
    cursor:pointer;
}

.tag.active{border-color:#00ffff;}

button{
    margin-top:20px;
    padding:10px 20px;
    background:#222;
    color:#fff;
    border:1px solid #444;
    cursor:pointer;
}

.results{
    margin-top:30px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
}

.card{
    background:#111;
    border:1px solid #222;
    padding:15px;
}

.line{margin-bottom:8px;}

.recommend{color:#00ffff;margin-top:10px;}

.shotBtn{
    margin-top:10px;
    font-size:12px;
    padding:6px 10px;
}

.output{
    margin-top:30px;
    background:#111;
    padding:20px;
    border:1px solid #222;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<h2>Story Lab v0.8</h2>

<textarea id="seed" placeholder="输入一个想法"></textarea>

<div id="styles"></div>

<button onclick="generate()">Generate</button>

<div id="results" class="results"></div>

<div id="shots" class="output"></div>

<script>

const API_KEY = "sk-fedd40541f68477f83cb3827ceec4abd";

// ===== 风格 =====
const templates = {
    "观察": `细节多，情绪不说`,
    "日常": `从日常开始，轻微异常`,
    "冷静": `像记录，不解释`
};

let selected = ["观察"];

// UI
const container = document.getElementById("styles");

Object.keys(templates).forEach(name=>{
    const el=document.createElement("div");
    el.className="tag active";
    el.innerText=name;
    el.onclick=()=>{
        selected=[name];
        document.querySelectorAll(".tag").forEach(t=>t.classList.remove("active"));
        el.classList.add("active");
    };
    container.appendChild(el);
});

// ===== Prompt =====
function buildPrompt(seed,style){
return `
写短故事

主题：${seed}

规则：${style}

结构：
日常 → 异常 → 放大 → 观察 → 收尾

要求：
- 6~12句
- 每句像镜头
- 不解释

输出：每行一句
`;
}

// ===== 分镜 Prompt =====
function buildShotPrompt(story){
return `
把下面故事转成分镜JSON

要求：
- 每句 = 一个镜头
- 不改写内容
- 每个镜头包含：

{
  "shot":编号,
  "text":原句,
  "type":景别（特写/中景/远景）,
  "visual":画面描述
}

输出JSON数组

故事：
${story}
`;
}

// ===== 孔老六 =====
function buildJudge(A,B,C){
return `
选最自然的一个

输出 A / B / C

A:
${A}

B:
${B}

C:
${C}
`;
}

// ===== API =====
async function callAI(prompt){

    const res = await fetch("https://api.deepseek.com/v1/chat/completions",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+API_KEY
        },
        body:JSON.stringify({
            model:"deepseek-chat",
            messages:[
                {role:"user",content:prompt}
            ],
            temperature:0.85
        })
    });

    const data = await res.json();
    return data.choices[0].message.content;
}

// ===== 主流程 =====
async function generate(){

    const seed=document.getElementById("seed").value;

    document.getElementById("results").innerHTML="Generating...";

    const style = templates[selected[0]];

    const A = await callAI(buildPrompt(seed,style));
    const B = await callAI(buildPrompt(seed,style));
    const C = await callAI(buildPrompt(seed,style));

    const pick = (await callAI(buildJudge(A,B,C))).trim();

    const map = {A,B,C};

    document.getElementById("results").innerHTML = ["A","B","C"].map(k=>`
        <div class="card">
            ${map[k].split("\n").map(l=>`<div class="line">${l}</div>`).join("")}
            ${pick===k?`<div class="recommend">⭐ 孔老六选这个</div>`:""}
            <button class="shotBtn" onclick="makeShots(\`${map[k]}\`)">
                用这个做分镜
            </button>
        </div>
    `).join("");
}

// ===== 分镜生成 =====
async function makeShots(story){

    document.getElementById("shots").innerText="生成分镜中...";

    const json = await callAI(buildShotPrompt(story));

    document.getElementById("shots").innerText=json;
}

</script>

</body>
</html>
