<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Story Lab</title>

<style>
body{
    background:#0a0a0a;
    color:#e8e8e8;
    font-family:system-ui;
    padding:40px;
}

h2{margin-bottom:5px;}
.desc{color:#888;margin-bottom:20px;}

textarea{
    width:100%;
    height:100px;
    background:#111;
    color:#fff;
    border:1px solid #333;
    padding:10px;
}

.tag{
    display:inline-block;
    padding:8px 14px;
    border:1px solid #333;
    margin:5px;
    cursor:pointer;
}

.tag small{
    display:block;
    font-size:11px;
    color:#666;
}

.tag.active{border-color:#00ffff;}

button{
    margin-top:20px;
    padding:10px 20px;
    background:#222;
    color:#fff;
    border:1px solid #444;
    cursor:pointer;
}

.results{
    margin-top:30px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
}

.card{
    background:#111;
    border:1px solid #222;
    padding:15px;
}

.line{margin-bottom:8px;}

.recommend{color:#00ffff;margin-top:10px;}

.comment{
    color:#aaa;
    margin-top:10px;
    font-size:13px;
}

.shotBtn{
    margin-top:10px;
    font-size:12px;
    padding:6px 10px;
}

.output{
    margin-top:30px;
    background:#111;
    padding:20px;
    border:1px solid #222;
    white-space:pre-wrap;
}

.copyBtn{
    margin-top:10px;
    font-size:12px;
}
</style>
</head>

<body>

<h2>Story Lab v0.9</h2>

<div class="desc">
输入一个想法 → 选择写作方式（最多2个） → 生成 → 选择 → 导演分镜
</div>

<textarea id="seed" placeholder="例如：我在电梯里看到未来的自己"></textarea>

<div id="styles"></div>

<button onclick="generate()">Generate</button>

<div id="results" class="results"></div>

<div id="shots" class="output"></div>
<button id="copyBtn" class="copyBtn" onclick="copyShots()" style="display:none;">
复制分镜 JSON
</button>

<script>

const API_KEY = "sk-fedd40541f68477f83cb3827ceec4abd";

// ===== 风格 =====
const templates = {
    "观察": {desc:"压抑日常",prompt:`细节多，情绪不说`},
    "日常": {desc:"轻微偏移",prompt:`从日常开始，异常很小`},
    "冷静": {desc:"像记录",prompt:`像记录，不解释`}
};

let selected = ["观察"];

// ===== UI =====
const container = document.getElementById("styles");

Object.keys(templates).forEach(name=>{
    const t = templates[name];
    const el=document.createElement("div");
    el.className="tag";
    el.innerHTML = `${name}<small>${t.desc}</small>`;
    if(name==="观察") el.classList.add("active");

    el.onclick=()=>{
        if(selected.includes(name)){
            selected = selected.filter(i=>i!==name);
            el.classList.remove("active");
        }else{
            if(selected.length>=2){
                alert("最多选2个");
                return;
            }
            selected.push(name);
            el.classList.add("active");
        }
    };
    container.appendChild(el);
});

// ===== Prompt =====
function buildPrompt(seed,style){
return `
写短故事

主题：${seed}

规则：
${style}

结构：
日常 → 异常 → 放大 → 观察 → 收尾

要求：
- 6~12句
- 每句像镜头
- 不解释
- 不总结
`;
}

// ===== 导演分镜（关键升级）=====
function buildShotPrompt(story){
return `
你是导演。

任务：
把故事改写为分镜，而不是复述。

规则：
1. 不要逐句翻译
2. 每个镜头必须增加信息（光/构图/动作/氛围）
3. 可以删除或合并句子
4. 控制节奏（有快有慢）

输出JSON：

{
"shot":1,
"intent":"这一镜的目的",
"type":"特写/中景/远景",
"camera":"推/拉/静止/跟随",
"visual":"画面",
"sound":"声音（可选）"
}

故事：
${story}
`;
}

// ===== 孔老六 =====
function buildJudge(A,B,C){
return `
你是孔老六。

选一个最像人写的。

输出两行：
第一行：A/B/C
第二行：一句短评（不超过12字）

A:
${A}

B:
${B}

C:
${C}
`;
}

// ===== API =====
async function callAI(prompt){
    const res = await fetch("https://api.deepseek.com/v1/chat/completions",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+API_KEY
        },
        body:JSON.stringify({
            model:"deepseek-chat",
            messages:[{role:"user",content:prompt}],
            temperature:0.85
        })
    });

    const data = await res.json();
    return data.choices[0].message.content;
}

// ===== 主流程（并发优化）=====
async function generate(){

    const seed=document.getElementById("seed").value;

    if(selected.length===0){
        alert("请选择风格");
        return;
    }

    document.getElementById("results").innerHTML="Generating...";
    document.getElementById("shots").innerText="";
    document.getElementById("copyBtn").style.display="none";

    let pA,pB,pC;

    if(selected.length===1){
        const s = templates[selected[0]].prompt;
        pA = callAI(buildPrompt(seed,s));
        pB = callAI(buildPrompt(seed,s));
        pC = callAI(buildPrompt(seed,s));
    }else{
        const s1 = templates[selected[0]].prompt;
        const s2 = templates[selected[1]].prompt;
        const mix = s1+"\n"+s2;

        pA = callAI(buildPrompt(seed,s1));
        pB = callAI(buildPrompt(seed,s2));
        pC = callAI(buildPrompt(seed,mix));
    }

    const [A,B,C] = await Promise.all([pA,pB,pC]);

    const judge = await callAI(buildJudge(A,B,C));
    const lines = judge.split("\n");

    const pick = lines[0].trim();
    const comment = lines[1] || "";

    const map = {A,B,C};

    document.getElementById("results").innerHTML = ["A","B","C"].map(k=>`
        <div class="card">
            <div style="color:#888">${k}</div>
            ${map[k].split("\n").map(l=>`<div class="line">${l}</div>`).join("")}
            ${pick===k?`<div class="recommend">⭐ 孔老六选这个</div>`:""}
            <button class="shotBtn" onclick="makeShots(\`${map[k]}\`)">
                用这个做分镜
            </button>
        </div>
    `).join("") + `
        <div class="comment">孔老六：${comment}</div>
    `;

    // 自动保存
    localStorage.setItem("storyLabData", JSON.stringify({
        seed:seed,
        results:document.getElementById("results").innerHTML
    }));
}

// ===== 分镜 =====
async function makeShots(story){

    document.getElementById("shots").innerText="生成分镜中...";
    document.getElementById("copyBtn").style.display="none";

    const json = await callAI(buildShotPrompt(story));

    document.getElementById("shots").innerText=json;
    document.getElementById("copyBtn").style.display="block";

    localStorage.setItem("storyLabShots", json);
}

// ===== 复制 =====
function copyShots(){
    navigator.clipboard.writeText(document.getElementById("shots").innerText);
    alert("已复制");
}

// ===== 恢复 =====
window.onload = function(){

    const data = localStorage.getItem("storyLabData");
    if(data){
        const obj = JSON.parse(data);
        document.getElementById("seed").value = obj.seed;
        document.getElementById("results").innerHTML = obj.results;
    }

    const shots = localStorage.getItem("storyLabShots");
    if(shots){
        document.getElementById("shots").innerText = shots;
        document.getElementById("copyBtn").style.display="block";
    }
}

</script>

</body>
</html>
