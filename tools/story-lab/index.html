<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Story Lab</title>

<style>
body{
    background:#0a0a0a;
    color:#e8e8e8;
    font-family:system-ui;
    padding:40px;
}

h1{font-size:28px;}
textarea{
    width:100%;
    height:80px;
    background:#111;
    color:white;
    border:1px solid #333;
    padding:10px;
    margin-top:10px;
}

button{
    margin-top:20px;
    padding:10px 20px;
    background:#222;
    color:white;
    border:1px solid #444;
    cursor:pointer;
}

button:hover{
    border-color:#00ffff;
}

.result{
    margin-top:30px;
    padding:20px;
    background:#111;
    border:1px solid #222;
}

.style{
    margin-top:20px;
}
</style>
</head>

<body>

<h1>Story Lab</h1>
<p>Generate short stories from ideas</p>

<textarea id="seed" placeholder="输入一个想法..."></textarea>

<div class="style">
<label><input type="checkbox" value="冷幽默+反转"> 冷幽默（星新一）</label><br>
<label><input type="checkbox" value="孤独+冷感+都市"> 冷感孤独（浅野一二〇）</label><br>
<label><input type="checkbox" value="温柔+日常+轻微情绪"> 温柔日常（细川貂々）</label>
</div>

<button onclick="generate()">Generate</button>

<div id="results"></div>

<script>

const API_KEY = "替换成你的key";

async function generate(){

    const seed = document.getElementById("seed").value;
    const styles = [...document.querySelectorAll("input:checked")].map(i=>i.value);

    document.getElementById("results").innerHTML = "Generating...";

    const prompt = `
你是一个短篇漫画故事生成器。

seed idea:
${seed}

风格：
${styles.join(" + ")}

要求：
- 5到8句
- 日常→异常→反应→收尾
- 每句简短
- 有轻微反转或情绪收尾

输出：
每行一句
`;

    const res = await fetch("https://api.deepseek.com/v1/chat/completions",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer " + API_KEY
        },
        body:JSON.stringify({
            model:"deepseek-chat",
            messages:[
                {role:"user",content:prompt}
            ],
            temperature:0.9
        })
    });

    const data = await res.json();

    const text = data.choices[0].message.content;

    document.getElementById("results").innerHTML = `
        <div class="result">
            ${text.replace(/\n/g,"<br>")}
        </div>
    `;
}

</script>

</body>
</html>
