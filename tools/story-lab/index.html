<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Story Lab</title>

<style>
body{
    background:#0a0a0a;
    color:#e8e8e8;
    font-family:system-ui;
    padding:40px;
}

h2{margin-bottom:5px;}
.desc{color:#888;margin-bottom:20px;}

textarea{
    width:100%;
    height:100px;
    background:#111;
    color:#fff;
    border:1px solid #333;
    padding:10px;
}

.tag{
    display:inline-block;
    padding:8px 14px;
    border:1px solid #333;
    margin:5px;
    cursor:pointer;
    font-size:14px;
}

.tag small{
    display:block;
    color:#666;
    font-size:11px;
}

.tag.active{
    border-color:#00ffff;
}

button{
    margin-top:20px;
    padding:10px 20px;
    background:#222;
    color:#fff;
    border:1px solid #444;
    cursor:pointer;
}

.results{
    margin-top:30px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
}

.card{
    background:#111;
    border:1px solid #222;
    padding:15px;
}

.line{
    margin-bottom:8px;
    line-height:1.5;
}

.title{
    color:#888;
    margin-bottom:10px;
}

.recommend{
    color:#00ffff;
    margin-top:10px;
}

.comment{
    color:#aaa;
    margin-top:5px;
    font-size:13px;
}
</style>
</head>

<body>

<h2>Story Lab v0.7</h2>
<div class="desc">
输入一个想法 → 选择写作方式 → 生成短故事
</div>

<textarea id="seed" placeholder="例如：我在电梯里看到未来的自己"></textarea>

<div id="styles"></div>

<button onclick="generate()">Generate</button>

<div id="results" class="results"></div>

<script>

const API_KEY = "sk-fedd40541f68477f83cb3827ceec4abd";

// ===== 风格 =====
const templates = {
    "冷静": {
        label:"冷静",
        desc:"像记录",
        prompt:`
语气冷静。
不解释。
不抒情。
`
    },
    "观察": {
        label:"观察",
        desc:"压抑日常",
        prompt:`
多细节。
人物反应迟缓。
情绪不说。
`
    },
    "日常": {
        label:"日常",
        desc:"轻微偏移",
        prompt:`
从日常开始。
异常很小。
不戏剧化。
`
    }
};

let selected = [];

// UI
const container = document.getElementById("styles");

Object.keys(templates).forEach(name=>{
    const t = templates[name];
    const el=document.createElement("div");

    el.className="tag";
    el.innerHTML = `${t.label}<small>${t.desc}</small>`;

    el.onclick=()=>{
        if(selected.includes(name)){
            selected=selected.filter(i=>i!==name);
            el.classList.remove("active");
        }else{
            if(selected.length>=2){alert("最多选2个");return;}
            selected.push(name);
            el.classList.add("active");
        }
    };

    container.appendChild(el);
});

// 默认
selected=["观察"];
container.children[1].classList.add("active");

// ===== Prompt =====
function buildPrompt(seed,styleText){
return `
写短故事

主题：${seed}

规则：
${styleText}

结构：
日常 → 异常 → 放大 → 观察 → 收尾

要求：
- 6~12句
- 每句具体
- 不解释
- 不总结
- 不哲理
- 不使用“突然”“仿佛”

输出：每行一句
`;
}

// ===== 孔老六评审 =====
function buildJudgePrompt(A,B,C){
return `
你是编辑“孔老六”。

下面三个故事，选一个最像人写的。

标准：
- 不刻意
- 不解释
- 有余味
- 克制

不要分析。

输出：
第一行：A 或 B 或 C
第二行：一句点评（不超过15字）

---

A：
${A}

B：
${B}

C：
${C}
`;
}

// ===== API =====
async function callAI(prompt){

    const res = await fetch("https://api.deepseek.com/v1/chat/completions",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+API_KEY
        },
        body:JSON.stringify({
            model:"deepseek-chat",
            messages:[
                {role:"system",content:"你是小说作者"},
                {role:"user",content:prompt}
            ],
            temperature:0.85
        })
    });

    const data = await res.json();
    return data.choices[0].message.content;
}

// ===== 主流程 =====
async function generate(){

    const seed=document.getElementById("seed").value;
    document.getElementById("results").innerHTML="Generating...";

    let A,B,C;

    if(selected.length===2){
        const mix = templates[selected[0]].prompt + templates[selected[1]].prompt;

        A = await callAI(buildPrompt(seed,templates[selected[0]].prompt));
        B = await callAI(buildPrompt(seed,templates[selected[1]].prompt));
        C = await callAI(buildPrompt(seed,mix));

    }else{
        A = await callAI(buildPrompt(seed,templates[selected[0]].prompt));
        B = await callAI(buildPrompt(seed,templates[selected[0]].prompt));
        C = await callAI(buildPrompt(seed,templates[selected[0]].prompt));
    }

    // 👉 孔老六
    const judge = await callAI(buildJudgePrompt(A,B,C));

    const lines = judge.split("\n");
    const pick = lines[0].trim();
    const comment = lines[1] || "";

    const map = {A:A,B:B,C:C};

    document.getElementById("results").innerHTML = ["A","B","C"].map(k=>`
        <div class="card">
            <div class="title">${k}</div>
            ${map[k].split("\n").map(l=>`<div class="line">${l}</div>`).join("")}
            ${pick===k?`<div class="recommend">⭐ 孔老六选了这个</div>`:""}
        </div>
    `).join("") + `
        <div style="grid-column:1/4" class="comment">
        孔老六：${comment}
        </div>
    `;
}

</script>

</body>
</html>
