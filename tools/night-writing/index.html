<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜写</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --secondary-color: #aaaaaa;
            --trace-color: #efefef; 
            --dot-color: #e8c26a; /* 暖黄色 */
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --transition-speed: 1.2s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: default;
        }

        .layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity var(--transition-speed) ease, filter var(--transition-speed) ease;
            z-index: 10;
        }

        .layer.active {
            display: flex !important;
            opacity: 1;
        }

        /* 状态1：入口 Entrance */
        #entrance-layer {
            flex-direction: column;
        }

        .entrance-info {
            text-align: center;
            margin-bottom: 80px;
            cursor: pointer;
            /* 时间文本的呼吸过渡 */
            transition: transform 4s ease-in-out, opacity 4s ease-in-out;
        }

        .day-count {
            font-size: 1rem;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
            color: var(--secondary-color);
        }

        .current-time {
            font-size: 2.2rem;
            font-weight: 200;
        }

        .time-trace {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 200px;
            user-select: none;
        }

        .trace-item {
            position: absolute;
            font-size: 0.7rem;
            white-space: nowrap;
            letter-spacing: 0.05em;
            transition: opacity 3s ease;
            cursor: default;
        }

        .trace-item.archived {
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 4px;
            text-decoration-color: transparent;
            transition: text-decoration-color 0.5s ease, opacity 0.5s ease;
        }

        .trace-item.archived:hover {
            text-decoration-color: var(--secondary-color);
            opacity: 0.8 !important;
        }

        /* 状态2：引子 Prompt */
        .prompt-text {
            font-size: 1.2rem;
            letter-spacing: 0.1em;
            font-weight: 300;
            text-align: center;
        }

        /* 状态3：写作 Writing */
        #writing-layer {
            width: 100%;
            height: 100%;
            padding: 20vh 24px 30vh 24px;
            display: none;
            flex-direction: column;
            align-items: center;
            overflow-y: auto; 
            -ms-overflow-style: none; 
            scrollbar-width: none;
        }

        #writing-layer::-webkit-scrollbar {
            display: none;
        }

        .writing-container {
            width: 100%;
            max-width: 680px;
            margin-left: 15%;
            margin-right: auto;
        }

        #editor {
            width: 100%;
            min-height: 50vh;
            border: none;
            outline: none;
            resize: none;
            font-size: 18px;
            line-height: 1.8;
            color: var(--text-color);
            background: transparent;
            font-family: inherit;
        }

        /* 状态: 归档回放 Archive View */
        #archive-view-layer {
            width: 100%;
            height: 100%;
            padding: 20vh 24px 30vh 24px;
            display: none;
            flex-direction: column;
            align-items: center;
            overflow-y: auto; 
            -ms-overflow-style: none;
            scrollbar-width: none;
            cursor: pointer;
        }

        #archive-view-layer::-webkit-scrollbar {
            display: none;
        }

        .archive-container {
            width: 100%;
            max-width: 680px;
            margin-left: 15%;
            margin-right: auto;
        }

        #archive-content {
            font-size: 18px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: var(--text-color);
        }

        /* 潮汐镜像 */
        #tide-mirror-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            display: none;
        }

        .tide-char {
            display: inline-block;
            transition: transform 3s ease-out, opacity 3s ease-out, filter 3s ease-out;
            white-space: pre-wrap;
        }

        .tide-char.washed {
            transform: translate(calc(var(--rand-x) * 1px), calc(var(--rand-y) * 1px - 50px)) rotate(calc(var(--rand-r) * 1deg));
            opacity: 0;
            filter: blur(8px);
        }

        /* 状态4：封存 */
        #return-info {
            position: fixed;
            bottom: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            color: var(--secondary-color);
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* 功能按钮 */
        .controls {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 60;
        }

        .action-btn {
            font-size: 0.85rem;
            color: var(--secondary-color);
            cursor: pointer;
            user-select: none;
            transition: all 0.5s ease;
            opacity: 0;
            pointer-events: none;
            background: none;
            border: none;
            outline: none;
            letter-spacing: 2px;
        }

        .action-btn.visible {
            opacity: 0.4;
            pointer-events: all;
        }

        /* 单一呼吸点 */
        #breath-container {
            position: fixed;
            bottom: 48px;
            left: 45px;
            width: 10px;
            height: 10px;
            z-index: 70;
        }

        .breath-dot {
            width: 5px;
            height: 5px;
            background-color: var(--dot-color);
            border-radius: 50%;
            opacity: 0.3;
            transform: scale(0.92);
            /* 节奏由 JS 控制 */
            transition: opacity 4s ease-in-out, transform 4s ease-in-out;
        }

        /* 状态消息 */
        #status-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 1.1rem;
            color: var(--text-color);
            letter-spacing: 0.2em;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease;
            z-index: 80;
        }

        /* 显露模式 Reveal */
        #reveal-layer {
            background-color: var(--bg-color);
            z-index: 200;
        }

        .emergence-text {
            position: absolute;
            font-size: 1.1rem;
            color: var(--text-color);
            opacity: 0;
            white-space: pre-wrap;
            max-width: 250px;
            transition: opacity 4s ease;
            animation: floatSlightly 12s ease-in-out infinite;
        }

        @keyframes floatSlightly {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="entrance-layer" class="layer">
        <div class="entrance-info" id="entrance-text-group" onclick="startWritingWorkflow()">
            <p class="day-count" id="display-day-count">Day 1 / 30</p>
            <p class="current-time" id="display-current-time">00:00</p>
        </div>
        <div class="time-trace" id="time-trace-container"></div>
    </div>

    <div id="prompt-layer" class="layer">
        <p class="prompt-text">今天有没有一个瞬间，你差点开口，但没有说。</p>
    </div>

    <main id="writing-layer" class="layer">
        <div class="writing-container">
            <textarea id="editor" spellcheck="false" placeholder="" readonly></textarea>
        </div>
    </main>

    <div id="archive-view-layer" class="layer" onclick="exitArchiveView()">
        <div class="archive-container">
            <div id="archive-content"></div>
        </div>
    </div>

    <div id="tide-mirror-layer"></div>
    <div id="reveal-layer" class="layer"></div>
    <div id="breath-container"></div>
    <div class="controls">
        <button id="archive-btn" class="action-btn">封存</button>
    </div>

    <div id="status-msg"></div>
    <div id="return-info"></div>

    <script>
        const apiKey = ""; 
        const model = "gemini-2.5-flash-preview-09-2025";
        
        const APP_STATE = {
            ENTRANCE: 'entrance',
            PROMPT: 'prompt',
            WRITING: 'writing',
            REVEAL: 'reveal',
            ARCHIVE: 'archive'
        };

        let userHistory = JSON.parse(localStorage.getItem('night-write-history-v4') || '[]');
        let currentDay = userHistory.length + 1;
        let totalDays = 30;
        let currentState = APP_STATE.ENTRANCE;
        
        let lastInputTime = 0;
        let isComposing = false;
        let currentSessionRhythm = [];
        let typingBufferLength = 0;
        let archiveAbortController = null;

        const layers = {
            [APP_STATE.ENTRANCE]: document.getElementById('entrance-layer'),
            [APP_STATE.PROMPT]: document.getElementById('prompt-layer'),
            [APP_STATE.WRITING]: document.getElementById('writing-layer'),
            [APP_STATE.REVEAL]: document.getElementById('reveal-layer'),
            [APP_STATE.ARCHIVE]: document.getElementById('archive-view-layer')
        };
        const editor = document.getElementById('editor');
        const tideMirror = document.getElementById('tide-mirror-layer');
        const archiveBtn = document.getElementById('archive-btn');
        const statusMsg = document.getElementById('status-msg');
        const returnInfo = document.getElementById('return-info');
        const breathContainer = document.getElementById('breath-container');
        const timeTraceContainer = document.getElementById('time-trace-container');
        const archiveContent = document.getElementById('archive-content');
        const archiveViewLayer = document.getElementById('archive-view-layer');
        const writingLayer = document.getElementById('writing-layer');
        const entranceTextGroup = document.getElementById('entrance-text-group');

        function init() {
            initBreathingCycle(); // 开启同步呼吸周期
            renderTimeTrace();
            updateClock();
            setInterval(updateClock, 1000);
            switchState(APP_STATE.ENTRANCE, 0);
            setInterval(flickerTrace, 4000);
        }

        async function switchState(newState, delay = 600) {
            Object.values(layers).forEach(layer => layer.classList.remove('active'));
            await new Promise(r => setTimeout(r, delay));
            currentState = newState;
            const targetLayer = layers[newState];
            if (targetLayer) targetLayer.classList.add('active');

            if (newState === APP_STATE.ENTRANCE) {
                archiveBtn.classList.remove('visible');
                statusMsg.style.opacity = '0';
                returnInfo.style.opacity = '0';
                tideMirror.style.display = 'none';
                renderTimeTrace();
            } else if (newState === APP_STATE.PROMPT) {
                setTimeout(() => {
                    if(currentState === APP_STATE.PROMPT) switchState(APP_STATE.WRITING, 1000);
                }, 4000);
            } else if (newState === APP_STATE.WRITING) {
                editor.value = "";
                editor.readOnly = true;
                editor.style.opacity = "1";
                currentSessionRhythm = [];
                typingBufferLength = 0;
                lastInputTime = Date.now();
                writingLayer.scrollTop = 0; 
                setTimeout(() => { editor.readOnly = false; editor.focus(); }, 800);
            } else if (newState === APP_STATE.REVEAL) {
                startRevealAnimation();
            }
        }

        // 修改：核心同步呼吸周期逻辑
        let currentPulseTimeout = null;
        function initBreathingCycle() {
            if (currentPulseTimeout) clearTimeout(currentPulseTimeout);
            breathContainer.innerHTML = '';
            const dot = document.createElement('div');
            dot.className = 'breath-dot';
            breathContainer.appendChild(dot);

            function runCycle() {
                // 呼吸周期随机在 8s - 10s 之间
                const cycleDuration = 8000 + Math.random() * 2000;
                const halfCycle = cycleDuration / 2;
                const pauseDuration = 500 + Math.random() * 500; // 极短停顿

                // 设置同步过渡时长
                dot.style.transition = `opacity ${halfCycle}ms ease-in-out, transform ${halfCycle}ms ease-in-out`;
                entranceTextGroup.style.transition = `opacity ${halfCycle}ms ease-in-out, transform ${halfCycle}ms ease-in-out`;

                // 1. 吸气阶段 (扩张/增强)
                dot.style.opacity = '0.6';
                dot.style.transform = 'scale(1.1)';
                
                // 时间文本轻微波动: opacity +10%, scale 1.02
                entranceTextGroup.style.opacity = '1';
                entranceTextGroup.style.transform = 'scale(1.02)';

                currentPulseTimeout = setTimeout(() => {
                    // 2. 呼气阶段 (收缩/淡化)
                    dot.style.opacity = '0.2';
                    dot.style.transform = 'scale(0.9)';
                    
                    // 时间文本轻微波动: opacity -10%, scale 1.0
                    entranceTextGroup.style.opacity = '0.85';
                    entranceTextGroup.style.transform = 'scale(1.0)';

                    currentPulseTimeout = setTimeout(() => {
                        // 3. 极短停顿后再开始下一次循环
                        currentPulseTimeout = setTimeout(runCycle, pauseDuration);
                    }, halfCycle);
                }, halfCycle);
            }

            // 初始延迟增加自然感
            setTimeout(runCycle, 1000);
        }

        // 覆盖原有的呼吸点逻辑，确保归档模式下仍能工作但尊重入口页的新规则
        function initBreathingDots(multiplier = 1.0) {
            // 在入口页不使用 multiplier 控制，保持自然呼吸。
            // 仅在 Archive 查看模式下通过此函数临时改变节奏（如有需要）。
            if (currentState === APP_STATE.ENTRANCE) return;
            initBreathingCycle(); 
        }

        function startWritingWorkflow() {
            if (currentDay > totalDays) switchState(APP_STATE.REVEAL, 1000);
            else switchState(APP_STATE.PROMPT, 800);
        }

        function renderTimeTrace() {
            timeTraceContainer.innerHTML = '';
            for (let i = 1; i <= totalDays; i++) {
                const item = document.createElement('div');
                item.className = 'trace-item';
                const isArchived = i < currentDay;
                let st = isArchived ? '已归档' : (i === currentDay ? '待书' : '（未到）');
                
                item.innerText = `Day ${i} · ${st}`;
                if (isArchived) {
                    item.classList.add('archived');
                    item.onclick = (e) => { e.stopPropagation(); enterArchiveView(i - 1); };
                }

                const r = Math.floor((i-1) / 5); const c = (i-1) % 5;
                item.style.left = `${c * 20 + 5}%`; item.style.top = `${r * 25 + 10}%`;
                item.style.transform = `translate(${(Math.random()-0.5)*40}px, ${(Math.random()-0.5)*20}px)`;
                item.style.opacity = i <= currentDay ? (0.15 + Math.random() * 0.2) : '0.04';
                if (i === currentDay) item.style.color = 'var(--secondary-color)';
                timeTraceContainer.appendChild(item);
            }
            document.getElementById('display-day-count').innerText = `Day ${currentDay > 30 ? 30 : currentDay} / ${totalDays}`;
        }

        async function enterArchiveView(index) {
            const entry = userHistory[index];
            if (!entry) return;

            if (archiveAbortController) archiveAbortController.abort();
            archiveAbortController = new AbortController();
            const signal = archiveAbortController.signal;

            archiveContent.innerText = '';
            archiveViewLayer.scrollTop = 0; 
            await switchState(APP_STATE.ARCHIVE);

            const rhythm = entry.rhythm || [];
            const text = entry.content || "";
            let charIndex = 0;

            try {
                for (const chunk of rhythm) {
                    if (signal.aborted) return;

                    if (chunk.type === 'pause') {
                        let duration = chunk.duration;
                        let compressedDuration = 0;
                        if (duration < 800) continue; 
                        else if (duration <= 2000) compressedDuration = 300 + Math.random() * 500;
                        else compressedDuration = 800 + Math.random() * 700;
                        
                        await new Promise(r => setTimeout(r, compressedDuration));
                    } else if (chunk.type === 'typing') {
                        for (let i = 0; i < chunk.length; i++) {
                            if (signal.aborted) return;
                            if (charIndex >= text.length) break;

                            archiveContent.innerText += text[charIndex++];
                            archiveViewLayer.scrollTop = archiveViewLayer.scrollHeight;
                            
                            const baseSpeed = 80 + Math.random() * 70;
                            const jitter = (Math.random() * 0.6 - 0.3) * baseSpeed;
                            await new Promise(r => setTimeout(r, baseSpeed + jitter));
                        }
                        if (Math.random() > 0.75) {
                            await new Promise(r => setTimeout(r, 200 + Math.random() * 400));
                        }
                    }
                }
            } catch (e) {}
        }

        function exitArchiveView() {
            if (archiveAbortController) archiveAbortController.abort();
            switchState(APP_STATE.ENTRANCE);
        }

        function flushTypingBuffer() {
            if (typingBufferLength > 0) {
                currentSessionRhythm.push({ type: 'typing', length: typingBufferLength });
                typingBufferLength = 0;
            }
        }

        editor.addEventListener('compositionstart', () => { isComposing = true; });
        editor.addEventListener('compositionend', (e) => { 
            isComposing = false; 
            const now = Date.now();
            const interval = now - lastInputTime;
            if (interval > 500) {
                flushTypingBuffer();
                currentSessionRhythm.push({ type: 'pause', duration: interval });
            }
            typingBufferLength += (e.data ? e.data.length : 0);
            lastInputTime = now;
            writingLayer.scrollTop = writingLayer.scrollHeight;
        });

        editor.addEventListener('input', (e) => {
            if (isComposing) return;
            const now = Date.now();
            const interval = now - lastInputTime;
            if (interval > 500) {
                flushTypingBuffer();
                currentSessionRhythm.push({ type: 'pause', duration: interval });
            }
            if (e.inputType === 'deleteContentBackward' || e.inputType === 'deleteContentForward') {
                typingBufferLength += 1;
            } else if (e.data) {
                typingBufferLength += e.data.length;
            } else if (e.inputType === 'insertLineBreak') {
                typingBufferLength += 1;
            }
            lastInputTime = now;
            writingLayer.scrollTop = writingLayer.scrollHeight;
            const hasText = editor.value.trim().length > 0;
            if (currentState === APP_STATE.WRITING) archiveBtn.classList.toggle('visible', hasText);
        });

        archiveBtn.addEventListener('click', async () => {
            const content = editor.value.trim();
            if (!content || archiveBtn.classList.contains('loading')) return;
            flushTypingBuffer();
            userHistory.push({ content, rhythm: currentSessionRhythm, timestamp: Date.now() });
            localStorage.setItem('night-write-history-v4', JSON.stringify(userHistory));
            editor.readOnly = true;
            archiveBtn.classList.remove('visible');
            runTideWash();
            const n = new Date();
            const ts = `${n.getFullYear()}.${(n.getMonth()+1).toString().padStart(2,'0')}.${n.getDate().toString().padStart(2,'0')} ${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`;
            returnInfo.innerText = ts; returnInfo.style.opacity = '1';
            statusMsg.innerText = "已落页"; statusMsg.style.opacity = '1';
            try {
                const echo = await callGemini(`读完这段话，请给我一个极简的回响：\n\n"${content}"`, "你是一个安静的聆听者。");
                setTimeout(() => { statusMsg.innerText = echo.trim() || "已落页"; }, 1500);
            } catch (e) {}
            setTimeout(() => {
                statusMsg.style.opacity = '0'; returnInfo.style.opacity = '0';
                setTimeout(() => {
                    tideMirror.style.opacity = "0"; 
                    setTimeout(() => {
                        if (userHistory.length >= totalDays) switchState(APP_STATE.REVEAL, 2000);
                        else { currentDay = userHistory.length + 1; switchState(APP_STATE.ENTRANCE, 1500); }
                    }, 1500);
                }, 1000);
            }, 6000);
        });

        async function runTideWash() {
            const text = editor.value;
            const rect = editor.getBoundingClientRect();
            tideMirror.innerHTML = '';
            tideMirror.style.display = 'block';
            tideMirror.style.left = rect.left + 'px'; tideMirror.style.top = rect.top + 'px';
            tideMirror.style.width = rect.width + 'px'; tideMirror.style.height = rect.height + 'px';
            tideMirror.style.fontSize = getComputedStyle(editor).fontSize;
            tideMirror.style.lineHeight = getComputedStyle(editor).lineHeight;
            tideMirror.style.padding = getComputedStyle(editor).padding;
            text.split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.innerText = char; span.className = 'tide-char';
                span.style.setProperty('--rand-x', (Math.random() - 0.5) * 150);
                span.style.setProperty('--rand-y', (Math.random() - 0.5) * 80);
                span.style.setProperty('--rand-r', (Math.random() - 0.5) * 90);
                tideMirror.appendChild(span);
            });
            editor.style.opacity = "0";
            const spans = tideMirror.querySelectorAll('.tide-char');
            requestAnimationFrame(() => {
                spans.forEach((span, i) => {
                    span.style.transitionDelay = `${(spans.length - i) * 2}ms`;
                    span.classList.add('washed');
                });
            });
        }

        function flickerTrace() {
            const tr = document.querySelectorAll('.trace-item');
            if (tr.length === 0) return;
            const t = tr[Math.floor(Math.random() * tr.length)];
            const o = t.style.opacity; t.style.opacity = parseFloat(o) * 2;
            setTimeout(() => t.style.opacity = o, 1000);
        }

        function updateClock() {
            const n = new Date();
            document.getElementById('display-current-time').innerText = n.getHours().toString().padStart(2, '0') + ":" + n.getMinutes().toString().padStart(2, '0');
        }

        function startRevealAnimation() {
            const rl = layers[APP_STATE.REVEAL];
            rl.innerHTML = ''; let cd = 1000;
            userHistory.forEach(entry => {
                cd += 800 + Math.random() * 2500;
                setTimeout(() => {
                    const s = document.createElement('span'); s.className = 'emergence-text';
                    s.innerText = (entry.content || "").substring(0, 50) + "...";
                    s.style.left = `${10 + Math.random() * 70}%`; s.style.top = `${10 + Math.random() * 80}%`;
                    s.style.opacity = (0.2 + Math.random() * 0.5).toString();
                    rl.appendChild(s);
                }, cd);
            });
        }

        async function callGemini(p, s) {
            const u = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            const pay = { contents: [{ parts: [{ text: p }] }], systemInstruction: s ? { parts: [{ text: s }] } : undefined };
            let d = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const r = await fetch(u, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(pay) });
                    const dat = await r.json(); return dat.candidates?.[0]?.content?.[0]?.parts?.[0]?.text || dat.candidates?.[0]?.content?.parts?.[0]?.text || "";
                } catch (error) { if (i === 4) throw error; await new Promise(r => setTimeout(r, d)); d *= 2; }
            }
        }

        init();
    </script>
</body>
</html>
