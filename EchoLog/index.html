<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EchoLog | ells 的观察实验室</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .safe-bottom-padding { padding-bottom: calc(env(safe-area-inset-bottom, 1rem) + 0.5rem); }
        .v1-prose .original-quote { font-size: 1.1rem; font-weight: 700; color: #1e293b; border-left: 4px solid #f1f5f9; padding-left: 1rem; margin-bottom: 1rem; line-height: 1.5; }
        .v1-prose .fact-block { font-size: 0.8rem; color: #64748b; background: #f8fafc; padding: 1rem; border-radius: 1rem; margin-bottom: 1.5rem; border: 1px solid #f1f5f9; }
        .v1-prose .path-card { font-size: 0.85rem; background: #ffffff; padding: 0.875rem; border-radius: 0.875rem; margin-bottom: 0.5rem; color: #334155; border: 1px solid #f1f5f9; }
        .v1-prose .judgment-star { background: #fffbeb; border: 1px solid #fef3c7; color: #92400e; padding: 1rem; border-radius: 1.25rem; font-size: 0.9rem; font-weight: 600; margin: 1.25rem 0; line-height: 1.5; }
        .v1-prose .info-pin { font-size: 0.75rem; color: #94a3b8; display: flex; items: center; gap: 0.5rem; padding-top: 0.5rem; }
        .animate-feed { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyD6ajvVXmi-eptTrhwz5WLuf8tAsYp2qzA",
            authDomain: "echolog-db.firebaseapp.com",
            projectId: "echolog-db",
            storageBucket: "echolog-db.firebasestorage.app",
            messagingSenderId: "997697883214",
            appId: "1:997697883214:web:87869e4cd9b73292c0071f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'ells-lab-v1';

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconKey = name.toLowerCase().replace(/-/g, '');
            const iconData = lucide.icons[name] || lucide.icons[iconKey];
            if (!iconData) return null;
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}
                    dangerouslySetInnerHTML={{ __html: iconData[2].map(tag => {
                        const [tagName, attrs] = tag;
                        const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                        return `<${tagName} ${attrStr} />`;
                    }).join('') }}
                />
            );
        };

        // --- 本地逻辑：提取 A/B/C ---
        function extractABC(content) {
            const lines = content.split('\n').map(l => l.trim()).filter(l => l);
            return {
                a: lines.find(l => l.includes('发生前') || l.includes('A'))?.replace(/.*[A：:]/,'') || '未提供',
                b: lines.find(l => l.includes('做了什么') || l.includes('B'))?.replace(/.*[B：:]/,'') || content.substring(0, 20) + '...',
                c: lines.find(l => l.includes('后来怎样') || l.includes('C'))?.replace(/.*[C：:]/,'') || '未提供'
            };
        }

        // --- AI 解析逻辑：只处理解释层 ---
        function parseAI(rawText) {
            const cleanText = rawText.replace(/```[a-z]*\n?|```/g, '');
            const lines = cleanText.split('\n').map(l => l.trim()).filter(l => l);
            const data = { paths: [], judgment: '', missing: '信息充足' };
            lines.forEach(line => {
                if (line.match(/^[①②12]/)) data.paths.push(line);
                else if (line.includes('⭐')) data.judgment = line.replace(/⭐\s*(下次只看这一点：)?/, '').trim();
                else if (line.includes('📌')) data.missing = line.replace(/📌\s*(还缺：)?/, '').trim();
            });
            return data;
        }

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('capture');
            const [child, setChild] = useState('A');
            const [notes, setNotes] = useState([]);
            const [input, setInput] = useState('');
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('ECHOLOG_API_KEY') || '');
            const [analysisModal, setAnalysisModal] = useState({ open: false, data: null, note: null });
            const [isAnalyzing, setIsAnalyzing] = useState(null);
            const textareaRef = useRef(null);

            useEffect(() => {
                auth.signInAnonymously();
                const unsubscribeAuth = auth.onAuthStateChanged((u) => setUser(u));
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const notesRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('notes');
                return notesRef.orderBy('timestamp', 'desc').onSnapshot((snap) => {
                    setNotes(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [user]);

            const handleSend = async () => {
                if (!input.trim() || !user) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('notes').add({
                        child, content: input.trim(), timestamp: Date.now(), analysis: null
                    });
                    setInput('');
                    if (textareaRef.current) textareaRef.current.style.height = 'auto';
                } catch (e) { alert("保存失败"); }
            };

            const requestAnalysis = async (note) => {
                if (note.analysis) {
                    const parsedData = typeof note.analysis === 'string' ? parseAI(note.analysis) : note.analysis.parsed;
                    setAnalysisModal({ open: true, data: parsedData, note });
                    return;
                }
                if (!apiKey) { setIsSettingsOpen(true); return; }
                setIsAnalyzing(note.id);
                
                const systemPrompt = `你是一个“行为观察辅助工具”，不是分析师。你的任务是基于记录提供理解路径。
禁止：重写记录、生成A/B/C、定义事实。
只能做：
1）给出最多2种“可能解释”（每条一句话，贴近原文）；
2）提供一个“下次观察点”；
3）指出一个“最关键缺失信息”。
格式：
① …
② …
⭐ 下次只看这一点：…
📌 还缺：…`;

                try {
                    const response = await fetch("https://api.deepseek.com/chat/completions", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                        body: JSON.stringify({
                            model: "deepseek-chat",
                            messages: [{ role: "system", content: systemPrompt }, { role: "user", content: note.content }],
                            temperature: 0.1
                        })
                    });
                    const result = await response.json();
                    const rawText = result.choices[0].message.content;
                    const parsed = parseAI(rawText);
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('notes').doc(note.id).update({ 
                        analysis: { raw: rawText, parsed: parsed } 
                    });
                    setAnalysisModal({ open: true, data: parsed, note });
                } catch (e) { alert("分析失败"); } finally { setIsAnalyzing(null); }
            };

            return (
                <div className="flex flex-col h-screen bg-slate-50 font-sans text-slate-900 overflow-hidden text-left">
                    <nav className="sticky top-0 z-30 bg-white/70 backdrop-blur-3xl border-b border-slate-100 px-6 pt-10 pb-4 shrink-0">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex gap-6 items-baseline">
                                <button onClick={() => setView('capture')} className={`text-xl transition-all ${view === 'capture' ? 'font-bold text-slate-900' : 'text-slate-400'}`}>捕获</button>
                                <button onClick={() => setView('reflection')} className={`text-xl transition-all ${view === 'reflection' ? 'font-bold text-slate-900' : 'text-slate-400'}`}>回顾</button>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className={`w-2 h-2 rounded-full transition-all duration-700 ${user ? 'bg-emerald-500 animate-pulse' : 'bg-slate-300'}`}></div>
                                <button onClick={() => setIsSettingsOpen(true)} className="p-2 bg-slate-100 rounded-full text-slate-400"><Icon name="settings-2" size={18} /></button>
                            </div>
                        </div>
                        {view === 'capture' && (
                            <div className="flex gap-4">
                                <button onClick={() => setChild('A')} className={`flex-1 flex items-center justify-center gap-2 p-3 rounded-2xl border transition-all ${child === 'A' ? 'bg-white border-blue-500 text-blue-500 shadow-lg' : 'bg-slate-50 border-transparent text-slate-400'}`}>
                                    <span className="text-lg">👦</span><span className="text-[10px] font-black uppercase tracking-widest">孩子 A</span>
                                </button>
                                <button onClick={() => setChild('B')} className={`flex-1 flex items-center justify-center gap-2 p-3 rounded-2xl border transition-all ${child === 'B' ? 'bg-white border-purple-500 text-purple-500 shadow-lg' : 'bg-slate-50 border-transparent text-slate-400'}`}>
                                    <span className="text-lg text-center">👧</span><span className="text-[10px] font-black uppercase tracking-widest">孩子 B</span>
                                </button>
                            </div>
                        )}
                    </nav>

                    <main className="flex-grow overflow-y-auto px-6 py-6 no-scrollbar pb-40">
                        {notes.filter(n => view === 'capture' ? n.child === child : true).map(note => {
                            const childAccent = note.child === 'A' ? '#3b82f6' : '#a855f7';
                            const childBg = note.child === 'A' ? '#f0f7ff' : '#faf5ff';
                            return (
                                <div key={note.id} className="p-6 rounded-[35px] shadow-sm flex flex-col gap-4 text-left mb-4 animate-feed relative" style={{ backgroundColor: childBg }}>
                                    <div className="flex justify-between items-start">
                                        <span className="text-[9px] font-black text-slate-300 uppercase tracking-widest">{new Date(note.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                        {note.analysis && <Icon name="check-circle-2" size={14} className="text-emerald-500" />}
                                    </div>
                                    <p className="text-[16px] text-slate-800 leading-snug whitespace-pre-wrap">{note.content}</p>
                                    <div className="mt-1 flex justify-end">
                                        <button onClick={() => requestAnalysis(note)} disabled={isAnalyzing === note.id} className={`text-[10px] font-bold py-2 px-6 rounded-full flex items-center gap-1.5 transition-all shadow-sm ${note.analysis ? 'bg-white/40 text-slate-400' : 'bg-white text-slate-900'}`} style={{ color: note.analysis ? '' : childAccent }}>
                                            {isAnalyzing === note.id ? <Icon name="loader-2" size={12} className="animate-spin" /> : <Icon name="sparkles" size={12} />} 
                                            {note.analysis ? '查看报告' : 'ABC 分析'}
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                    </main>

                    {view === 'capture' && (
                        <footer className="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-slate-50 to-transparent z-40 safe-bottom-padding">
                            <div className="max-w-2xl mx-auto">
                                <div className="bg-white rounded-[28px] shadow-2xl border border-slate-100 p-2 flex items-end gap-2">
                                    <textarea ref={textareaRef} value={input} onChange={(e) => { setInput(e.target.value); e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }} 
                                        rows={3} className="flex-grow py-3 px-4 text-slate-700 bg-transparent focus:outline-none resize-none text-[15px] leading-relaxed" 
                                        placeholder="发生前（A）：&#10;做了什么（B）：&#10;后来怎样（C）："
                                    />
                                    <button onClick={handleSend} disabled={!input.trim()} className="bg-slate-900 text-white w-12 h-12 rounded-full flex items-center justify-center shrink-0 mb-1 mr-1 active:scale-90 transition-all disabled:opacity-20 shadow-lg">
                                        <Icon name="arrow-up" size={24} />
                                    </button>
                                </div>
                            </div>
                        </footer>
                    )}

                    {analysisModal.open && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 bg-slate-900/60 backdrop-blur-xl">
                            <div className="bg-white w-full max-w-lg rounded-t-[40px] sm:rounded-[40px] shadow-2xl flex flex-col overflow-hidden animate-feed">
                                <div className="p-10 pb-6 text-left v1-prose overflow-y-auto max-h-[75vh]">
                                    <div className="original-quote">📝 记录摘要</div>
                                    
                                    {/* 关键修复点：本地生成的 ABC 事实层 */}
                                    {(() => {
                                        const abc = extractABC(analysisModal.note.content);
                                        return (
                                            <div className="fact-block">
                                                <div className="font-bold mb-2 flex items-center gap-1.5 opacity-40 uppercase tracking-tighter text-[10px]"><Icon name="puzzle" size={12}/> 事实层 / Fact Layer</div>
                                                <div>A 前因：{abc.a}</div>
                                                <div>B 行为：{abc.b}</div>
                                                <div>C 结果：{abc.c}</div>
                                            </div>
                                        );
                                    })()}

                                    <div className="font-bold mb-3 opacity-40 uppercase tracking-tighter text-[10px]">AI 视角 / Interpretations</div>
                                    <div className="space-y-2 mb-4">
                                        {analysisModal.data.paths.map((p, i) => <div key={i} className="path-card">{p}</div>)}
                                    </div>
                                    {analysisModal.data.judgment && <div className="judgment-star">⭐ {analysisModal.data.judgment}</div>}
                                    <div className="flex items-center gap-1 text-[11px] text-slate-400 mt-4 italic"><Icon name="help-circle" size={12}/> {analysisModal.data.missing}</div>
                                </div>
                                <div className="p-10 pt-4"><button onClick={() => setAnalysisModal({ open: false, data: null, note: null })} className="w-full py-5 bg-slate-900 text-white rounded-[28px] font-bold active:scale-95 shadow-xl">确定</button></div>
                            </div>
                        </div>
                    )}

                    {isSettingsOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-md">
                            <div className="bg-white w-full max-w-sm rounded-[40px] shadow-2xl p-8 animate-feed">
                                <div className="flex justify-between items-center mb-6"><h3 className="font-bold text-xl">系统配置</h3><button onClick={() => setIsSettingsOpen(false)} className="text-slate-400"><Icon name="x" size={20} /></button></div>
                                <div className="space-y-6">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase block mb-2">DeepSeek API Key</label><input type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)} className="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-sm outline-none focus:ring-2 focus:ring-slate-200" placeholder="sk-..." /></div>
                                    <button onClick={() => { localStorage.setItem('ECHOLOG_API_KEY', apiKey); setIsSettingsOpen(false); }} className="w-full py-5 bg-slate-900 text-white rounded-[25px] font-bold shadow-xl active:scale-95 transition-all">保存</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
