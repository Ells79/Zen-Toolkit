<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EchoLog | ells 的观察实验室</title>
    
    <!-- 1. 加载运行环境 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 2. 改用 Firebase Compat 版本：修复运行环境冲突，确保全局可用 -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .safe-bottom-padding { padding-bottom: calc(env(safe-area-inset-bottom, 1rem) + 0.5rem); }
        .v1-prose .original-quote { font-size: 1.1rem; font-weight: 700; color: #1e293b; border-left: 4px solid #f1f5f9; padding-left: 1rem; margin-bottom: 1.25rem; line-height: 1.5; }
        .v1-prose .abc-block { font-size: 0.75rem; color: #94a3b8; border-left: 2px solid #e2e8f0; padding-left: 0.75rem; margin-bottom: 1.25rem; line-height: 1.6; }
        .v1-prose .path-card { font-size: 0.8rem; background: #f1f5f9; padding: 0.875rem; border-radius: 0.875rem; margin-bottom: 0.5rem; color: #64748b; }
        .v1-prose .judgment-star { background: #fffbeb; border: 1px solid #fef3c7; color: #92400e; padding: 1rem; border-radius: 1.25rem; font-size: 0.9rem; font-weight: 600; margin: 1.25rem 0; line-height: 1.5; }
        .animate-feed { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- 3. 应用核心逻辑：删除所有 import，改用全局 API -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 1. ells 的私有云端配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyD6ajvVXmi-eptTrhwz5WLuf8tAsYp2qzA",
            authDomain: "echolog-db.firebaseapp.com",
            projectId: "echolog-db",
            storageBucket: "echolog-db.firebasestorage.app",
            messagingSenderId: "997697883214",
            appId: "1:997697883214:web:87869e4cd9b73292c0071f"
        };

        // 替换初始化代码：使用 Compat 风格
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'ells-lab-v1';

        // --- 2. 工具组件：Icon ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconKey = name.toLowerCase().replace(/-/g, '');
            const iconData = lucide.icons[name] || lucide.icons[iconKey];
            if (!iconData) return null;
            
            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                    dangerouslySetInnerHTML={{ __html: iconData[2].map(tag => {
                        const [tagName, attrs] = tag;
                        const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                        return `<${tagName} ${attrStr} />`;
                    }).join('') }}
                />
            );
        };

        // --- 3. 逻辑配置 ---
        const BEHAVIOR_PATTERNS = [
            { key: 'sleep', title: '睡眠模式', words: ['睡觉', '睡前', '起床', '梦', '被子'] },
            { key: 'food', title: '饮食行为', words: ['吃', '零食', '晚饭', '挑食', '糖'] },
            { key: 'emotion', title: '情绪反应', words: ['哭', '发脾气', '闹', '生气', '伤心'] },
            { key: 'study', title: '学习/专注', words: ['作业', '积木', '阅读', '专注', '玩'] },
            { key: 'curiosity', title: '好奇/探索', words: ['问', '为什么', '影子', '光', '太阳'] },
            { key: 'social', title: '社交互动', words: ['打', '抢', '分享', '哥哥', '妹妹', '抱'] }
        ];

        function parseAI(rawText) {
            const cleanText = rawText.replace(/```[a-z]*\n?|```/g, '');
            const lines = cleanText.split('\n').map(l => l.trim()).filter(l => l);
            const data = {
                quote: '', abc: { a: '未提供', b: '未提供', c: '未提供' },
                paths: [], judgment: '', missing: '信息充足'
            };
            lines.forEach(line => {
                if (line.includes('📝')) data.quote = line.replace(/📝\s*["“]|["”]/g, '').trim();
                else if (line.match(/^A[：:]/)) data.abc.a = line.replace(/^A[：:]\s*/, '').trim();
                else if (line.match(/^B[：:]/)) data.abc.b = line.replace(/^B[：:]\s*/, '').trim();
                else if (line.match(/^C[：:]/)) data.abc.c = line.replace(/^C[：:]\s*/, '').trim();
                else if (line.match(/^[①②12]/)) data.paths.push(line);
                else if (line.includes('⭐')) data.judgment = line.replace(/⭐\s*/, '').trim();
                else if (line.includes('📌')) data.missing = line.replace(/📌\s*/, '').trim();
            });
            return data;
        }

        function matchPattern(noteContent) {
            const found = BEHAVIOR_PATTERNS.find(p => p.words.some(word => noteContent.includes(word)));
            return found ? found.key : null;
        }

        // --- 4. 子组件 ---
        function NoteCard({ note, onAnalyze, isAnalyzing, isReflection }) {
            const childAccent = note.child === 'A' ? '#3b82f6' : '#a855f7';
            const childBg = note.child === 'A' ? '#f0f7ff' : '#faf5ff';
            const hasAnalysis = !!note.analysis;
            
            return (
                <div className="p-6 rounded-[35px] shadow-sm flex flex-col gap-4 text-left mb-4 animate-feed relative transition-transform active:scale-[0.98]" style={{ backgroundColor: childBg }}>
                    <div className="flex justify-between items-start">
                        <span className="text-[9px] font-black text-slate-300 uppercase tracking-widest">{new Date(note.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        {hasAnalysis && <Icon name="check-circle-2" size={14} className="text-emerald-500" />}
                    </div>
                    <p className="text-[16px] text-slate-800 leading-snug whitespace-pre-wrap">{note.content}</p>
                    {!isReflection && (
                        <div className="mt-1 flex justify-end">
                            <button onClick={onAnalyze} disabled={isAnalyzing}
                                className={`text-[10px] font-bold py-2 px-6 rounded-full flex items-center gap-1.5 transition-all shadow-sm ${hasAnalysis ? 'bg-white/40 text-slate-400' : 'bg-white text-slate-900 active:bg-slate-50'}`} 
                                style={{ color: hasAnalysis ? '' : childAccent }}>
                                {isAnalyzing ? <Icon name="loader-2" size={12} className="animate-spin" /> : <Icon name="sparkles" size={12} />} 
                                {hasAnalysis ? '查看报告' : 'ABC 分析'}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        // --- 5. 主组件 ---
        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('capture');
            const [child, setChild] = useState('A');
            const [notes, setNotes] = useState([]);
            const [input, setInput] = useState('');
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('ECHOLOG_API_KEY') || '');
            const [analysisModal, setAnalysisModal] = useState({ open: false, data: null });
            const [isAnalyzing, setIsAnalyzing] = useState(null);
            const [selectedPatternKey, setSelectedPatternKey] = useState(null);
            const textareaRef = useRef(null);

            useEffect(() => {
                // 替换 Auth 调用为全局风格
                auth.signInAnonymously().catch(e => console.error("Auth Error", e));
                const unsubscribeAuth = auth.onAuthStateChanged((u) => setUser(u));
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                // 替换 Firestore 调用：artifacts/appId/users/userId/notes
                const notesRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('notes');
                const unsubscribe = notesRef.onSnapshot((snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setNotes(data.sort((a, b) => b.timestamp - a.timestamp));
                });
                return () => unsubscribe();
            }, [user]);

            const handleSend = async () => {
                if (!input.trim() || !user) return;
                try {
                    const notesRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('notes');
                    await notesRef.add({
                        child, content: input.trim(), timestamp: Date.now(), analysis: null
                    });
                    setInput('');
                    if (textareaRef.current) textareaRef.current.style.height = 'auto';
                } catch (e) { alert("保存失败"); }
            };

            const requestAnalysis = async (note) => {
                // 修复分析判空与兼容性逻辑
                let parsedData = null;
                if (note.analysis) {
                    if (typeof note.analysis === 'string') {
                        parsedData = parseAI(note.analysis);
                    } else {
                        parsedData = note.analysis.parsed;
                    }
                    setAnalysisModal({ open: true, data: parsedData });
                    return;
                }
                
                if (!apiKey) { setIsSettingsOpen(true); return; }
                setIsAnalyzing(note.id);
                
                const systemPrompt = `资深行为观察员。按“EchoLog 分析卡片模板（V1.5）”输出。要求：字数≤220；禁术语。1.提取ABC(引用原文); 2.B不清晰只重述; 3.AC缺失不输出⭐模块; 4.只有ABC完整才输出⭐。`;

                try {
                    const response = await fetch("https://api.deepseek.com/chat/completions", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                        body: JSON.stringify({
                            model: "deepseek-chat",
                            messages: [{ role: "system", content: systemPrompt }, { role: "user", content: note.content }],
                            temperature: 0.1
                        })
                    });
                    const result = await response.json();
                    if (result.error) throw new Error(result.error.message);
                    const rawText = result.choices[0].message.content;
                    const parsed = parseAI(rawText);
                    
                    // 替换更新调用：使用 doc(id).update()
                    const noteRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('notes').doc(note.id);
                    await noteRef.update({ analysis: { raw: rawText, parsed: parsed } });
                    setAnalysisModal({ open: true, data: parsed });
                } catch (e) { alert("分析失败：" + e.message); } finally { setIsAnalyzing(null); }
            };

            return (
                <div className="flex flex-col h-screen bg-slate-50 font-sans text-slate-900 overflow-hidden text-left">
                    {/* Header */}
                    <nav className="sticky top-0 z-30 bg-white/70 backdrop-blur-3xl border-b border-slate-100 px-6 pt-10 pb-4 shrink-0">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex gap-6 items-baseline">
                                <button onClick={() => setView('capture')} className={`text-xl transition-all ${view === 'capture' ? 'font-bold text-slate-900' : 'text-slate-400'}`}>捕获</button>
                                <button onClick={() => setView('reflection')} className={`text-xl transition-all ${view === 'reflection' ? 'font-bold text-slate-900' : 'text-slate-400'}`}>回顾</button>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className={`w-2 h-2 rounded-full transition-all duration-700 ${user ? 'bg-emerald-500 animate-pulse' : 'bg-slate-300'}`}></div>
                                <button onClick={() => setIsSettingsOpen(true)} className="p-2 bg-slate-100 rounded-full text-slate-400"><Icon name="settings-2" size={18} /></button>
                            </div>
                        </div>
                        {view === 'capture' && (
                            <div className="flex gap-4">
                                <button onClick={() => setChild('A')} className={`flex-1 flex items-center justify-center gap-2 p-3 rounded-2xl border transition-all ${child === 'A' ? 'bg-white border-blue-500 text-blue-500 shadow-lg scale-[1.02]' : 'bg-slate-50 border-transparent text-slate-400'}`}>
                                    <span className="text-lg">👦</span><span className="text-[10px] font-black uppercase">孩子 A</span>
                                </button>
                                <button onClick={() => setChild('B')} className={`flex-1 flex items-center justify-center gap-2 p-3 rounded-2xl border transition-all ${child === 'B' ? 'bg-white border-purple-500 text-purple-500 shadow-lg scale-[1.02]' : 'bg-slate-50 border-transparent text-slate-400'}`}>
                                    <span className="text-lg text-center">👧</span><span className="text-[10px] font-black uppercase">孩子 B</span>
                                </button>
                            </div>
                        )}
                    </nav>

                    {/* Main Content */}
                    <main className="flex-grow overflow-y-auto px-6 py-6 no-scrollbar pb-40">
                        {view === 'capture' ? (
                            notes.filter(n => n.child === child).length === 0 ? (
                                <div className="flex flex-col items-center justify-center py-32 text-slate-300">
                                    <Icon name="scan-eye" size={48} className="mb-4 opacity-20" />
                                    <p className="text-sm">观察实验室已就绪</p>
                                </div>
                            ) : (
                                notes.filter(n => n.child === child).map(note => (
                                    <NoteCard key={note.id} note={note} onAnalyze={() => requestAnalysis(note)} isAnalyzing={isAnalyzing === note.id} />
                                ))
                            )
                        ) : (
                            <div className="space-y-8">
                                <div className="flex gap-3 overflow-x-auto no-scrollbar">
                                    {BEHAVIOR_PATTERNS.map(p => {
                                        const count = notes.filter(n => matchPattern(n.content) === p.key).length;
                                        if (count < 2) return null;
                                        return (
                                            <button key={p.key} onClick={() => setSelectedPatternKey(selectedPatternKey === p.key ? null : p.key)} 
                                                className={`flex-shrink-0 p-4 rounded-3xl text-left border transition-all ${selectedPatternKey === p.key ? 'bg-slate-900 text-white border-slate-900 shadow-xl' : 'bg-white border-slate-100'}`}>
                                                <p className="font-bold text-sm">“{p.title}”</p>
                                                <p className={`text-[9px] font-bold mt-1 ${selectedPatternKey === p.key ? 'opacity-50' : 'text-slate-300'}`}>{count} 次发生</p>
                                            </button>
                                        );
                                    })}
                                </div>
                                <div className="space-y-4">
                                    <h4 className="text-[10px] font-black text-slate-300 uppercase tracking-widest px-1">行为脉络回顾</h4>
                                    {notes.filter(n => !selectedPatternKey || matchPattern(n.content) === selectedPatternKey).map(note => (
                                        <NoteCard key={note.id} note={note} isReflection />
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer Input */}
                    {view === 'capture' && (
                        <footer className="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-slate-50 to-transparent z-40 safe-bottom-padding">
                            <div className="max-w-2xl mx-auto">
                                <div className="bg-white rounded-[28px] shadow-2xl border border-slate-100 p-2 flex items-end gap-2">
                                    <textarea ref={textareaRef} value={input} 
                                        onChange={(e) => {
                                            setInput(e.target.value);
                                            e.target.style.height = 'auto';
                                            e.target.style.height = e.target.scrollHeight + 'px';
                                        }} 
                                        rows={3} className="flex-grow py-3 px-4 text-slate-700 bg-transparent focus:outline-none resize-none text-[15px] leading-relaxed" 
                                        placeholder="发生前（A）：&#10;做了什么（B）：&#10;后来怎样（C）："
                                    />
                                    <button onClick={handleSend} disabled={!input.trim()}
                                        className="bg-slate-900 text-white w-12 h-12 rounded-full flex items-center justify-center shrink-0 mb-1 mr-1 active:scale-90 transition-all disabled:opacity-20 shadow-lg">
                                        <Icon name="arrow-up" size={24} />
                                    </button>
                                </div>
                            </div>
                        </footer>
                    )}

                    {/* Analysis Modal */}
                    {analysisModal.open && analysisModal.data && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 bg-slate-900/60 backdrop-blur-xl">
                            <div className="bg-white w-full max-w-lg rounded-t-[40px] sm:rounded-[40px] shadow-2xl flex flex-col overflow-hidden">
                                <div className="p-10 pb-6 text-left v1-prose overflow-y-auto max-h-[75vh]">
                                    <div className="original-quote">📝 “{analysisModal.data.quote}”</div>
                                    <div className="abc-block">
                                        <div className="font-bold mb-2 flex items-center gap-1.5 opacity-40 uppercase tracking-tighter text-[10px]"><Icon name="puzzle" size={12}/> 行为拆解</div>
                                        <div>A 前因：{analysisModal.data.abc.a}</div>
                                        <div>B 行为：{analysisModal.data.abc.b}</div>
                                        <div>C 结果：{analysisModal.data.abc.c}</div>
                                    </div>
                                    <div className="space-y-2 mb-4">
                                        {analysisModal.data.paths.map((p, i) => {
                                            const parts = p.split('->');
                                            return <div key={i} className="path-card">{parts.length > 1 ? (<><strong>{parts[0]}</strong>{parts.slice(1).join('->')}</>) : p}</div>;
                                        })}
                                    </div>
                                    {analysisModal.data.judgment && <div className="judgment-star">⭐ {analysisModal.data.judgment}</div>}
                                    <div className="flex items-center gap-1 text-[11px] text-slate-400 mt-4 italic"><Icon name="help-circle" size={12}/> {analysisModal.data.missing}</div>
                                </div>
                                <div className="p-10 pt-4"><button onClick={() => setAnalysisModal({ open: false, data: null })} className="w-full py-5 bg-slate-900 text-white rounded-[28px] font-bold active:scale-95 shadow-xl">确定</button></div>
                            </div>
                        </div>
                    )}

                    {/* Settings Modal */}
                    {isSettingsOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-md">
                            <div className="bg-white w-full max-w-sm rounded-[40px] shadow-2xl p-8 animate-in zoom-in duration-300">
                                <div className="flex justify-between items-center mb-6"><h3 className="font-bold text-xl">系统配置</h3><button onClick={() => setIsSettingsOpen(false)} className="text-slate-400"><Icon name="x" size={20} /></button></div>
                                <div className="space-y-6">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 px-1">DeepSeek API Key</label><input type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)} className="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-sm outline-none focus:ring-2 focus:ring-slate-200" placeholder="sk-..." /></div>
                                    <button onClick={() => { localStorage.setItem('ECHOLOG_API_KEY', apiKey); setIsSettingsOpen(false); }} className="w-full py-5 bg-slate-900 text-white rounded-[25px] font-bold shadow-xl active:scale-95 transition-all">保存并应用</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
