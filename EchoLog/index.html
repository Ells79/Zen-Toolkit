<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EchoLog</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {background:#f8fafc;font-family:-apple-system;}
.card {background:#fff;padding:16px;border-radius:16px;margin-bottom:12px;}
.delete-btn {position:absolute;right:0;top:0;bottom:0;width:80px;background:red;color:#fff;display:flex;align-items:center;justify-content:center;}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

// ===== 1. Firebase 配置 (已填入 ells 的专属参数) =====
firebase.initializeApp({
  apiKey: "AIzaSyD6ajvVXmi-eptTrhwz5WLuf8tAsYp2qzA",
  authDomain: "echolog-db.firebaseapp.com",
  projectId: "echolog-db",
  storageBucket: "echolog-db.firebasestorage.app",
  messagingSenderId: "997697883214",
  appId: "1:997697883214:web:87869e4cd9b73292c0071f"
});
const db = firebase.firestore();

// ===== 家庭ID =====
const FAMILY_ID = "ells_family";

// ===== Pattern =====
const PATTERNS = [
  {key:"sleep_snack",title:"睡前要零食",words:["睡前","零食","吃"]},
  {key:"attention",title:"注意力涣散",words:["神游","走神","不专心"]}
];

function matchPattern(text){
  return PATTERNS.find(p=>p.words.some(w=>text.includes(w)));
}

// ===== ABC =====
function extractABC(t){
  return {
    a:t.split("，")[0]||"未提供",
    b:t,
    c:t.includes("哭")?"情绪变化":"未提供"
  }
}

// ===== App =====
function App(){

  const [notes,setNotes]=React.useState([]);
  const [input,setInput]=React.useState("");
  const [tab,setTab]=React.useState("capture");
  const [offsetId,setOffsetId]=React.useState(null);
  const startX=React.useRef(0);

  // 数据监听
  React.useEffect(()=>{
    return db.collection("families")
      .doc(FAMILY_ID)
      .collection("notes")
      .orderBy("timestamp","desc")
      .onSnapshot(snap=>{
        setNotes(snap.docs.map(d=>({id:d.id,...d.data()})));
      });
  },[]);

  // 发送
  const send=async()=>{
    if(!input.trim())return;

    const p=matchPattern(input);

    await db.collection("families")
      .doc(FAMILY_ID)
      .collection("notes")
      .add({
        content:input,
        timestamp:Date.now(),
        pattern:p?.key||null,
        patternTitle:p?.title||null
      });

    setInput("");
  };

  // 删除
  const del=async(id)=>{
    if(confirm("确定删除吗？")) {
        await db.collection("families")
          .doc(FAMILY_ID)
          .collection("notes")
          .doc(id).delete();
    }
  };

  // 滑动
  const ts=(e,id)=>startX.current=e.touches[0].clientX;
  const tm=(e,id)=>{
    if(e.touches[0].clientX-startX.current<-50) setOffsetId(id);
  };
  const te=()=>setTimeout(()=>setOffsetId(null),2000);

  // ===== 回顾聚合 =====
  const grouped = notes.reduce((acc,n)=>{
    if(!n.pattern) return acc;
    if(!acc[n.pattern]) acc[n.pattern]={title:n.patternTitle,list:[]};
    acc[n.pattern].list.push(n);
    return acc;
  },{});

  return(
    <div className="max-w-md mx-auto p-4">

      <div className="flex justify-between mb-4 px-4 pt-4">
        <button onClick={()=>setTab("capture")} className={tab==="capture"?"font-bold text-lg":"text-gray-400"}>捕获</button>
        <button onClick={()=>setTab("review")} className={tab==="review"?"font-bold text-lg":"text-gray-400"}>回顾</button>
      </div>

      {tab==="capture" && (
        <>
          <textarea
            className="w-full p-4 border rounded-2xl shadow-sm focus:ring-1 focus:ring-gray-300 outline-none transition-all"
            rows="3"
            placeholder={"发生前（A）：\n做了什么（B）：\n后来怎样（C）："}
            value={input}
            onChange={e=>setInput(e.target.value)}
          />

          <button onClick={send} className="bg-black text-white w-full mt-3 py-3 rounded-2xl font-bold active:scale-95 transition-all">记录瞬间</button>

          <div className="mt-6">
            {notes.map(n=>{
              const abc=extractABC(n.content);
              return(
                <div key={n.id} className="relative overflow-hidden mb-3 rounded-2xl">

                  {offsetId===n.id && (
                    <div className="delete-btn" onClick={()=>del(n.id)}>删除</div>
                  )}

                  <div
                    className="card"
                    style={{ 
                        margin: 0,
                        transform: offsetId === n.id ? 'translateX(-80px)' : 'translateX(0)',
                        transition: 'transform 0.2s'
                    }}
                    onTouchStart={(e)=>ts(e,n.id)}
                    onTouchMove={(e)=>tm(e,n.id)}
                    onTouchEnd={te}
                  >

                    {n.patternTitle && <div className="text-[10px] font-bold text-purple-500 bg-purple-50 w-fit px-2 py-0.5 rounded-full mb-2">🔁 {n.patternTitle}</div>}

                    <div className="text-slate-800 leading-relaxed">{n.content}</div>

                    <div className="text-[10px] text-gray-400 mt-3 pt-2 border-t border-gray-50 flex gap-2">
                      <span>A:{abc.a}</span>|<span>C:{abc.c}</span>
                    </div>

                  </div>
                </div>
              )
            })}
          </div>
        </>
      )}

      {tab==="review" && (
        <div className="space-y-4">
          <div className="text-xs font-bold text-gray-400 px-1 uppercase tracking-widest">模式聚合</div>
          {Object.values(grouped).length === 0 ? (
            <div className="text-center py-20 text-gray-300">暂未发现重复模式</div>
          ) : (
            Object.values(grouped).map(g=>(
              <div key={g.title} className="card">
                <div className="font-bold flex justify-between items-center">
                  <span>🔁 {g.title}</span>
                  <span className="text-xs bg-slate-100 px-2 py-1 rounded-full">{g.list.length}次</span>
                </div>

                <div className="mt-3 space-y-2 border-t border-gray-50 pt-3">
                  {g.list.slice(0,3).map(n=>(
                    <div key={n.id} className="text-sm text-gray-500 flex items-start gap-2">
                      <span className="text-gray-300 mt-1">●</span>
                      {n.content}
                    </div>
                  ))}
                </div>
              </div>
            ))
          )}
        </div>
      )}

    </div>
  )
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
